<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CernimCherno · Аналитика</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #b8d4e8;
      color: white;
      overflow-x: hidden;
    }

    /* Sky gradient background with grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, #c8dff0 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, #d4e8f5 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, #a8c8e0 0%, transparent 60%),
        linear-gradient(160deg, #c2dff2 0%, #9ec4dc 40%, #b0d0e8 70%, #8ab8d4 100%);
      z-index: -2;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.4;
      z-index: -1;
      pointer-events: none;
    }

    /* Glass mixin */
    .glass {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding: 0 28px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-size: 14px; font-weight: 600; letter-spacing: 0.18em;
      color: white; text-decoration: none; opacity: 0.95;
    }

    .nav { display: flex; gap: 6px }
    .nav a {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all .2s;
    }
    .nav a:hover { background: rgba(255,255,255,0.15); color: white }
    .nav a.active {
      background: white;
      color: #6a9ab8;
      border-color: white;
    }

    /* Category bar */
    .cat-bar {
      padding: 16px 28px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .cat-btn {
      font-size: 12px; font-weight: 500;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      cursor: pointer; transition: all .2s;
      white-space: nowrap;
    }
    .cat-btn:hover { background: rgba(255,255,255,0.22); color: white }
    .cat-btn.active {
      background: white; color: #6a9ab8;
      border-color: white; font-weight: 600;
    }
    .cat-btn .count {
      font-size: 10px; opacity: 0.6; margin-left: 4px;
    }
    .cat-btn.active .count { opacity: 0.5 }

    /* Main */
    .main { padding: 24px 28px; max-width: 1600px; margin: 0 auto }

    /* Season legend */
    .season-legend {
      display: flex; gap: 20px; margin-bottom: 18px; align-items: center;
    }
    .season-legend span {
      font-size: 11px; color: rgba(255,255,255,0.7);
      display: flex; align-items: center; gap: 6px; font-weight: 500;
    }
    .season-dot { width: 10px; height: 10px; border-radius: 3px }
    .s-winter { background: rgba(140,180,230,0.8) }
    .s-spring { background: rgba(140,210,160,0.8) }
    .s-summer { background: rgba(240,180,100,0.8) }
    .s-autumn { background: rgba(180,130,90,0.8) }

    /* Product list */
    .product-list { display: flex; flex-direction: column; gap: 3px }

    .product-row {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      overflow: hidden;
      transition: background .15s;
    }
    .product-row:hover { background: rgba(255,255,255,0.2) }

    .product-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer;
    }

    .expand-icon {
      font-size: 9px; color: rgba(255,255,255,0.5);
      width: 14px; flex-shrink: 0; transition: transform .15s;
    }
    .expand-icon.open { transform: rotate(90deg) }

    .product-name { font-size: 13px; font-weight: 400; flex: 1; min-width: 0; color: white }
    .product-total {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.7); white-space: nowrap;
    }

    /* Hide button */
    .hide-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      cursor: pointer; font-size: 10px; font-weight: 500;
      padding: 3px 10px; border-radius: 12px;
      opacity: 0; transition: all .15s; white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .product-header:hover .hide-btn { opacity: 1 }
    .hide-btn:hover { background: rgba(255,80,80,0.25); border-color: rgba(255,100,100,0.5); color: white }

    /* Chart */
    .chart-wrap { position: relative; height: 48px; flex: 1; min-width: 150px; max-width: 600px; cursor: zoom-in }

    /* Chart modal */
    .chart-modal {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(100,150,180,0.4);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      align-items: center; justify-content: center;
    }
    .chart-modal.open { display: flex }
    .chart-modal-inner {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 16px; padding: 28px;
      width: 90vw; max-width: 1000px;
    }
    .chart-modal-title {
      font-size: 16px; font-weight: 600; color: white;
      margin-bottom: 20px;
    }
    .chart-modal-close {
      float: right; background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white; cursor: pointer; padding: 4px 12px;
      border-radius: 12px; font-size: 12px; font-family: 'Inter', sans-serif;
    }

    /* Sizes */
    .sizes-section {
      padding: 4px 14px 12px 40px;
      display: flex; flex-direction: column; gap: 4px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .size-row { display: flex; align-items: center; gap: 12px }
    .size-label { font-size: 11px; color: rgba(255,255,255,0.5); width: 80px; flex-shrink: 0 }
    .size-stock { font-size: 11px; color: rgba(255,255,255,0.6); width: 36px; text-align: right; flex-shrink: 0 }

    /* Hidden panel */
    .hidden-panel {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; overflow: hidden;
    }
    .hidden-panel-header {
      padding: 12px 16px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500;
    }
    .hidden-panel-header:hover { background: rgba(255,255,255,0.08) }
    .hidden-list { display: none; flex-direction: column }
    .hidden-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px; color: rgba(255,255,255,0.8);
    }
    .restore-btn {
      background: white; border: none; color: #6a9ab8;
      cursor: pointer; font-size: 11px; font-weight: 600;
      padding: 4px 12px; border-radius: 12px;
      font-family: 'Inter', sans-serif; transition: opacity .15s;
    }
    .restore-btn:hover { opacity: 0.8 }

    .loading {
      text-align: center; padding: 60px;
      color: rgba(255,255,255,0.6); font-size: 13px;
    }
    .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); font-size: 12px }
    .progress-bar {
      height: 2px; background: rgba(255,255,255,0.15);
      border-radius: 1px; margin: 12px 0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: rgba(255,255,255,0.6);
      border-radius: 1px; transition: width .3s;
    }
  </style>
</head>
<body>

<div class="header">
  <a class="logo" href="/">CERNIM CHERNO</a>
  <nav class="nav">
    <a href="/">Остатки</a>
    <a href="/analytics" class="active">Аналитика</a>
    <a href="/turnover">Оборачиваемость</a>
    <a href="/order">Заказ</a>
  </nav>
</div>

<div class="cat-bar" id="cat-bar">
  <div style="color:rgba(255,255,255,0.5);font-size:12px;padding:4px 0">Загрузка...</div>
</div>

<div class="main">
  <div class="season-legend">
    <span><div class="season-dot s-winter"></div>Зима</span>
    <span><div class="season-dot s-spring"></div>Весна</span>
    <span><div class="season-dot s-summer"></div>Лето</span>
    <span><div class="season-dot s-autumn"></div>Осень</span>
  </div>
  <div id="product-list" class="product-list">
    <div class="loading">
      <div>Загружаю данные...</div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="progress-text" style="font-size:11px;margin-top:8px;opacity:0.6"></div>
    </div>
  </div>
  <div class="hidden-panel" id="hidden-panel" style="display:none">
    <div class="hidden-panel-header" onclick="toggleHiddenPanel()">
      <span>Скрытые позиции — <span id="hidden-count">0</span></span>
      <span style="opacity:0.5">▼</span>
    </div>
    <div class="hidden-list" id="hidden-list"></div>
  </div>
</div>

<!-- Chart modal -->
<div class="chart-modal" id="chart-modal" onclick="closeModal()">
  <div class="chart-modal-inner" onclick="event.stopPropagation()">
    <div class="chart-modal-title" id="modal-title">
      <button class="chart-modal-close" onclick="closeModal()">✕ Закрыть</button>
    </div>
    <canvas id="modal-canvas" style="width:100%;height:300px;display:block"></canvas>
  </div>
</div>

<script>
const CATEGORIES = {
  "Верхняя одежда": ["бомбер","куртка","тренч","пальто","ветровка","олимпийка","комбинезон","фрак","меховой пиджак"],
  "Костюмы": ["пиджак","жилет-галстук","корсетный жилет"],
  "Брюки": ["брюки","джинсы","спортивные брюки"],
  "Рубашки": ["рубашка"],
  "Свитера": ["свитер"],
  "Худи и свитшоты": ["худи","свитшот"],
  "Шорты": ["шорты"],
  "Майки": ["майка","топ","лонгслив","кроп кольчуга","манишка кольчуга","майка кольчуга"],
  "Футболки": ["футболка"],
  "Сумки": ["сумка","клатч"],
  "Аксессуары": ["ремень","галстук","шарф","шапка","носки","воротник","меховой ворот"],
  "Украшения": ["браслет","кольцо","подвеска","серьга","кафф","цепь","цепочка","сет из"],
  "Нижнее белье": ["боксер","брифы","комплект"],
  "Очки": ["очки"],
  "Прочее": []
};
const CAT_ORDER = ["Верхняя одежда","Костюмы","Брюки","Рубашки","Свитера","Худи и свитшоты","Шорты","Майки","Футболки","Сумки","Аксессуары","Украшения","Нижнее белье","Очки","Прочее"];

// Season colors in sky palette
const SEASON_COLORS = {
  winter: 'rgba(140,185,230,0.3)',
  spring: 'rgba(140,210,165,0.3)',
  summer: 'rgba(240,185,100,0.3)',
  autumn: 'rgba(180,130,90,0.3)'
};
const LINE_COLOR = 'rgba(255,255,255,0.85)';
const LINE_COLOR_DIM = 'rgba(255,255,255,0.45)';
const FILL_COLOR = 'rgba(255,255,255,0.08)';

const CACHE_KEY = 'cc_analytics_v2';
const CACHE_DATES_KEY = 'cc_analytics_dates_v2';

let allDates = [];
let stockData = {};
let currentCat = "Верхняя одежда";
let hiddenItems = new Set();
let modalData = null;

function getCategory(name) {
  const nl = name.toLowerCase();
  if (nl.includes("sample")) return null;
  if (nl.includes("сертификат") || nl.includes("кошелек")) return "Прочее";
  for (const [cat, kws] of Object.entries(CATEGORIES)) {
    if (cat === "Прочее") continue;
    if (kws.some(k => nl.includes(k))) return cat;
  }
  return "Прочее";
}

function stripSize(name) { return name.replace(/\s*\([^)]*\)\s*$/, '').trim() }
function getSize(name) { const m = name.match(/\(([^)]+)\)\s*$/); return m ? m[1] : null }
function getSeason(d) {
  const m = parseInt(d.split('-')[1]);
  if (m===12||m<=2) return 'winter';
  if (m<=5) return 'spring';
  if (m<=8) return 'summer';
  return 'autumn';
}

async function loadHidden() {
  try {
    const r = await fetch('/api/hidden');
    const data = await r.json();
    hiddenItems = new Set(data);
    renderHiddenPanel();
  } catch(e) {}
}

async function hideItem(name) {
  hiddenItems.add(name);
  await fetch('/api/hide', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sku_base: name})});
  renderCategory(currentCat);
  renderHiddenPanel();
}

async function restoreItem(name) {
  hiddenItems.delete(name);
  await fetch(`/api/hide/${encodeURIComponent(name)}`, {method:'DELETE'});
  renderCategory(currentCat);
  renderHiddenPanel();
}

function toggleHiddenPanel() {
  const list = document.getElementById('hidden-list');
  const isOpen = list.style.display === 'flex';
  list.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) list.style.flexDirection = 'column';
}

function renderHiddenPanel() {
  const panel = document.getElementById('hidden-panel');
  const list = document.getElementById('hidden-list');
  document.getElementById('hidden-count').textContent = hiddenItems.size;
  panel.style.display = hiddenItems.size > 0 ? 'block' : 'none';
  list.innerHTML = [...hiddenItems].sort().map(name =>
    `<div class="hidden-item">
      <span>${name}</span>
      <button class="restore-btn" data-name="${name.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" onclick="restoreItem(this.dataset.name)">Восстановить</button>
    </div>`
  ).join('');
}

// Modal
function openModal(name, dateMap) {
  document.getElementById('modal-title').innerHTML =
    `<button class="chart-modal-close" onclick="closeModal()">✕</button>${name}`;
  document.getElementById('chart-modal').classList.add('open');
  const canvas = document.getElementById('modal-canvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = 300;
  drawChart(canvas, dateMap, allDates, false, true);
}
function closeModal() {
  document.getElementById('chart-modal').classList.remove('open');
}

// Cache
async function loadAllData() {
  // Check if dates changed
  let cachedDatesStr = null;
  try { cachedDatesStr = localStorage.getItem(CACHE_DATES_KEY) } catch(e) {}

  const datesRes = await fetch('/api/dates');
  const datesJson = await datesRes.json();
  allDates = datesJson.map(d => d.date).sort();
  const currentDatesStr = JSON.stringify(allDates);

  if (allDates.length === 0) {
    document.getElementById('product-list').innerHTML = '<div class="empty">Нет данных. Загрузите отчёты на странице Остатки.</div>';
    return;
  }

  // Try cache
  if (cachedDatesStr === currentDatesStr) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (cached) {
        stockData = cached;
        buildCategoryTabs();
        renderCategory(currentCat);
        return;
      }
    } catch(e) {}
  }

  // Load fresh
  const total = allDates.length;
  document.getElementById('product-list').innerHTML = `
    <div class="loading">
      <div>Загружаю данные...</div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div id="progress-text" style="font-size:11px;margin-top:8px;opacity:0.6">0 / ${total} дней</div>
    </div>`;

  stockData = {};
  for (let i = 0; i < allDates.length; i++) {
    const date = allDates[i];
    let page = 1, hasMore = true;
    while (hasMore) {
      const res = await fetch(`/api/stocks?date=${date}&page=${page}&per_page=200`);
      const data = await res.json();
      for (const item of data.items) {
        if (!stockData[item.sku_name]) stockData[item.sku_name] = {};
        stockData[item.sku_name][date] = item.stock_qty;
      }
      if (page >= data.pages) hasMore = false;
      page++;
    }
    const pct = Math.round(((i+1)/total)*100);
    const prog = document.getElementById('progress');
    const pt = document.getElementById('progress-text');
    if (prog) prog.style.width = pct+'%';
    if (pt) pt.textContent = `${i+1} / ${total} дней`;
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }

  // Save to cache
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(stockData));
    localStorage.setItem(CACHE_DATES_KEY, currentDatesStr);
  } catch(e) {}

  buildCategoryTabs();
  renderCategory(currentCat);
}

function buildCategoryTabs() {
  const allSkus = Object.keys(stockData);
  const catCounts = {};
  const seen = {};
  for (const sku of allSkus) {
    const base = stripSize(sku);
    const cat = getCategory(base);
    if (!cat) continue;
    if (!seen[base]) { catCounts[cat] = (catCounts[cat]||0)+1; seen[base]=true; }
  }
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = CAT_ORDER.filter(c => catCounts[c]>0).map(cat =>
    `<button class="cat-btn ${cat===currentCat?'active':''}" onclick="selectCat('${cat}')">
      ${cat}<span class="count">${catCounts[cat]}</span>
    </button>`
  ).join('');
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(cat));
  });
  renderCategory(cat);
}

function getPositionsForCat(cat) {
  const positions = {};
  for (const [sku, dateMap] of Object.entries(stockData)) {
    const base = stripSize(sku);
    if (getCategory(base) !== cat) continue;
    if (hiddenItems.has(base)) continue;
    const size = getSize(sku) || 'One Size';
    if (!positions[base]) positions[base] = { sizes:{}, all:{} };
    positions[base].sizes[size] = dateMap;
    for (const [date, qty] of Object.entries(dateMap)) {
      positions[base].all[date] = (positions[base].all[date]||0) + qty;
    }
  }
  return positions;
}

function renderCategory(cat) {
  const positions = getPositionsForCat(cat);
  const names = Object.keys(positions).sort();
  const list = document.getElementById('product-list');
  list.innerHTML = '';
  if (!names.length) { list.innerHTML='<div class="empty">Нет позиций</div>'; return; }

  const lastDate = allDates[allDates.length-1];

  for (const name of names) {
    const pos = positions[name];
    const sizes = Object.keys(pos.sizes).sort();
    const hasSizes = sizes.length > 1 || (sizes.length===1 && sizes[0]!=='One Size');
    const currentStock = pos.all[lastDate]||0;

    const row = document.createElement('div');
    row.className = 'product-row';

    const header = document.createElement('div');
    header.className = 'product-header';

    const safeAttr = name.replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    header.innerHTML = `
      <div class="expand-icon">${hasSizes?'▶':' '}</div>
      <div class="product-name">${name}</div>
      <canvas class="chart-wrap" width="400" height="48" style="flex:1;min-width:150px;max-width:500px;height:48px;cursor:zoom-in"></canvas>
      <div class="product-total">${currentStock} шт</div>
      <button class="hide-btn" data-name="${safeAttr}" onclick="event.stopPropagation();hideItem(this.dataset.name)">Скрыть</button>
    `;
    row.appendChild(header);

    const canvas = header.querySelector('canvas');
    drawChart(canvas, pos.all, allDates, false, false);
    canvas.addEventListener('click', (e) => { e.stopPropagation(); openModal(name, pos.all); });

    if (hasSizes) {
      const sizesDiv = document.createElement('div');
      sizesDiv.className = 'sizes-section';
      sizesDiv.style.display = 'none';

      // All sizes row
      const allRow = document.createElement('div');
      allRow.className = 'size-row';
      const allC = document.createElement('canvas');
      allC.width=400; allC.height=32; allC.style.cssText='flex:1;height:32px;display:block';
      allRow.innerHTML = `<div class="size-label" style="color:rgba(255,255,255,0.7);font-weight:500">Все</div>`;
      allRow.appendChild(allC);
      const allS = document.createElement('div'); allS.className='size-stock'; allS.textContent=currentStock;
      allRow.appendChild(allS);
      sizesDiv.appendChild(allRow);
      drawChart(allC, pos.all, allDates, true, false);

      for (const size of sizes) {
        const sRow = document.createElement('div'); sRow.className='size-row';
        const sc = document.createElement('canvas');
        sc.width=400; sc.height=32; sc.style.cssText='flex:1;height:32px;display:block';
        sRow.innerHTML=`<div class="size-label">${size}</div>`;
        sRow.appendChild(sc);
        const ss=document.createElement('div'); ss.className='size-stock';
        ss.textContent=pos.sizes[size][lastDate]||0;
        sRow.appendChild(ss);
        sizesDiv.appendChild(sRow);
        drawChart(sc, pos.sizes[size], allDates, true, false);
      }

      row.appendChild(sizesDiv);
      header.addEventListener('click', () => {
        if (!hasSizes) return;
        const isOpen = sizesDiv.style.display!=='none';
        sizesDiv.style.display = isOpen?'none':'flex';
        if (!isOpen) sizesDiv.style.flexDirection='column';
        header.querySelector('.expand-icon').classList.toggle('open', !isOpen);
      });
    }
    list.appendChild(row);
  }
}

function drawChart(canvas, dateMap, dates, small, large) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth||canvas.width;
  const H = canvas.height;
  canvas.width = W;
  ctx.clearRect(0,0,W,H);
  if (dates.length<2) return;

  // Season backgrounds
  let prevS=null, segStart=0;
  for (let i=0; i<=dates.length; i++) {
    const s = i<dates.length ? getSeason(dates[i]) : null;
    if (s!==prevS && prevS!==null) {
      const x1=(segStart/(dates.length-1))*W;
      const x2=(Math.min(i,dates.length-1)/(dates.length-1))*W;
      ctx.fillStyle=SEASON_COLORS[prevS];
      ctx.fillRect(x1,0,x2-x1,H);
    }
    if (s!==prevS){prevS=s;segStart=i;}
  }

  // Build values with forward fill
  const vals=[]; let last=0;
  for (const d of dates) {
    if (dateMap[d]!==undefined) last=dateMap[d];
    vals.push(last);
  }
  const maxVal=Math.max(...vals,1);
  const pad=small?2:large?16:4;

  // Line
  ctx.beginPath();
  ctx.strokeStyle=small?LINE_COLOR_DIM:LINE_COLOR;
  ctx.lineWidth=small?1:large?2:1.5;
  ctx.lineJoin='round';
  for (let i=0;i<vals.length;i++) {
    const x=(i/(vals.length-1))*W;
    const y=H-pad-(vals[i]/maxVal)*(H-pad*2);
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Fill
  const lastX=W, lastY=H;
  ctx.lineTo(lastX,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=small?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.1)';
  ctx.fill();
}

window.addEventListener('resize', ()=>renderCategory(currentCat));
loadHidden();
loadAllData();
</script>
