<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chernim Cherno · Остатки</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; background: #f3e9e0; color: #1f1f1f; }
    .gradient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #f3e9e0; }
    .gradient-bg::before, .gradient-bg::after, .b1, .b2, .b3 {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.9; }
    .gradient-bg::before { content: ''; width: 70vw; height: 70vw;
      background: radial-gradient(circle, #efe5db, transparent 70%);
      top: -20%; left: -10%; animation: blob1 11s ease-in-out infinite alternate; }
    .gradient-bg::after { content: ''; width: 60vw; height: 60vw;
      background: radial-gradient(circle, #e2d8cf, transparent 70%);
      bottom: -15%; right: -10%; animation: blob2 14s ease-in-out infinite alternate; }
    .b1 { width: 55vw; height: 55vw; background: radial-gradient(circle, #d3c9c2, transparent 70%);
      top: 30%; left: 30%; animation: blob3 9s ease-in-out infinite alternate; }
    .b2 { width: 45vw; height: 45vw; background: radial-gradient(circle, #c1b8b3, transparent 70%);
      top: -10%; right: 10%; animation: blob4 13s ease-in-out infinite alternate; }
    .b3 { width: 50vw; height: 50vw; background: radial-gradient(circle, #aba3a0, transparent 70%);
      bottom: 10%; left: 20%; animation: blob5 16s ease-in-out infinite alternate; }
    .vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(171,163,160,0.35) 100%); }
    .grain { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .grain::before { content: ''; position: absolute; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
      background-size: 200px 200px; opacity: 0.12; mix-blend-mode: overlay;
      animation: grain-shift 0.15s steps(1) infinite; }
    @keyframes grain-shift {
      0%{transform:translate(0,0)} 10%{transform:translate(-3%,-4%)} 20%{transform:translate(4%,2%)}
      30%{transform:translate(-2%,5%)} 40%{transform:translate(5%,-3%)} 50%{transform:translate(-4%,4%)}
      60%{transform:translate(3%,-2%)} 70%{transform:translate(-5%,3%)} 80%{transform:translate(2%,-5%)}
      90%{transform:translate(-3%,2%)} 100%{transform:translate(4%,-4%)} }
    @keyframes blob1 { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(8vw,5vh) scale(1.1)} 66%{transform:translate(-5vw,10vh) scale(0.95)} 100%{transform:translate(10vw,-8vh) scale(1.05)} }
    @keyframes blob2 { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(-10vw,-6vh) scale(1.08)} 66%{transform:translate(6vw,-12vh) scale(1.12)} 100%{transform:translate(-8vw,5vh) scale(0.92)} }
    @keyframes blob3 { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(-12vw,8vh) scale(1.15)} 100%{transform:translate(8vw,-10vh) scale(0.9)} }
    @keyframes blob4 { 0%{transform:translate(0,0) scale(0.9)} 50%{transform:translate(10vw,12vh) scale(1.1)} 100%{transform:translate(-6vw,6vh) scale(1)} }
    @keyframes blob5 { 0%{transform:translate(0,0) scale(1.1)} 50%{transform:translate(14vw,-8vh) scale(0.9)} 100%{transform:translate(-10vw,-12vh) scale(1.05)} }
    .header { position: sticky; top: 0; z-index: 200; padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; }
    .logo { text-decoration: none; display:flex; align-items:center;
      font-size: 15px; font-weight: 400; letter-spacing: 0.12em; color: #1f1f1f; }
    .nav { display: flex; gap: 20px }
    .nav a { font-size: 13px; font-weight: 400; letter-spacing: 0.05em;
      color: rgba(31,31,31,0.45); text-decoration: none; transition: color .2s; }
    .nav a:hover { color: #434446 }
    .nav a.active { color: #1f1f1f; font-weight: 500; }
    .main { padding: 20px 28px; max-width: 1500px; margin: 0 auto; position: relative; z-index: 3; }
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .sum-card { border-radius: 14px; padding: 18px 20px; backdrop-filter: blur(10px);
      border: 1px solid rgba(31,31,31,0.07); }
    .sum-card .lbl { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
    .sum-card .cond { font-size: 10px; opacity: .55; margin-bottom: 10px; }
    .sum-card .val { font-size: 30px; font-weight: 700; line-height: 1; }
    .sum-card .sub { font-size: 11px; opacity: .55; margin-top: 6px; }
    .sum-card .money { font-size: 17px; font-weight: 700; margin-top: 8px; }
    .sc-best .money { color: #3c6300 } .sc-good .money { color: #4b7a00 }
    .sc-mid .money { color: #8a7b00 } .sc-bad .money { color: #dd0004 }
    .sc-best  { background: rgba(143,233,0,0.4); }
    .sc-good  { background: rgba(75,122,0,0.14); }
    .sc-mid   { background: rgba(233,208,0,0.22); }
    .sc-bad   { background: rgba(221,0,4,0.12); }
    .sc-best .lbl { color: #3c6300 } .sc-good .lbl { color: #4b7a00 }
    .sc-mid .lbl  { color: #8a7b00 } .sc-bad .lbl  { color: #dd0004 }
    .tools { display:flex; align-items:center; gap:12px; margin-bottom: 14px; }
    .search { flex: 0 0 320px; padding: 8px 14px; border-radius: 10px; font-size: 13px;
      border: 1px solid rgba(31,31,31,0.16); background: rgba(255,255,255,0.7); color:#1f1f1f; outline:none; }
    .search:focus { border-color: rgba(31,31,31,0.45) }
    .note { font-size: 11px; color: rgba(31,31,31,0.45) }
    .warn { padding: 10px 16px; border-radius: 10px; background: rgba(233,208,0,0.22);
      font-size: 12px; color: #434446; margin-bottom: 14px; display: none; }
    .twrap { background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
      border: 1px solid rgba(31,31,31,0.09); border-radius: 12px;
      overflow: auto; max-height: calc(100vh - 300px); }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th { background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 10px; text-align: center; font-size: 10px; font-weight: 500;
      color: rgba(31,31,31,0.62); letter-spacing: 0.07em; text-transform: uppercase;
      white-space: nowrap; position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid rgba(31,31,31,0.09); }
    thead th:first-child { text-align: left; padding-left: 14px; }
    thead th .sub { display:block; font-size:9px; font-weight:400; letter-spacing:0; text-transform:none; opacity:0.45; margin-top:2px; }
    tbody td { padding: 8px 10px; border-bottom: 1px solid rgba(31,31,31,0.07);
      text-align: center; vertical-align: middle; color: #1f1f1f; }
    tbody td:first-child { text-align: left; padding-left: 14px; font-weight: 500; }
    .rg2 td { background: rgba(143,233,0,0.35) }
    .rg1 td { background: rgba(75,122,0,0.1) }
    .ro  td { background: rgba(233,208,0,0.12) }
    .rr  td { background: rgba(221,0,4,0.1) }
    .rgr td { background: rgba(255,255,255,0.55); opacity: 0.5 }
    .rg2:hover td { background: rgba(143,233,0,0.5) }
    .rg1:hover td { background: rgba(75,122,0,0.18) }
    .ro:hover  td { background: rgba(233,208,0,0.22) }
    .rr:hover  td { background: rgba(221,0,4,0.16) }
    .qty { font-weight: 700; font-size: 13px; }
    .qty.zero { opacity: 0.3; font-weight: 400; }
    .zbar { position:relative; width:88px; height:20px; border-radius:4px; overflow:hidden; background:rgba(255,255,255,0.7); margin:0 auto }
    .zfill { position:absolute; left:0; top:0; height:100%; border-radius:4px }
    .ztxt { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700 }
    .defwrap { display:flex; align-items:center; justify-content:center; gap:5px }
    .defbox { width:36px; height:14px; border-radius:3px }
    .loading { text-align:center; padding:60px; color:rgba(31,31,31,0.45); font-size:13px }
  </style>
</head>
<body>
<div class="gradient-bg"><div class="b1"></div><div class="b2"></div><div class="b3"></div></div>
<div class="vignette"></div><div class="grain"></div>

<div class="header">
  <a class="logo" href="/">Chernim&nbsp;Cherno</a>
  <nav class="nav">
    <a href="/">Data</a>
    <a href="/analytics" class="active">Остатки</a>
    <a href="/turnover">Оборачиваемость</a>
    <a href="/order">Заказ</a>
    <a href="/forecast">Прогноз</a>
    <a href="/revenue">Оборот</a>
    <a href="/transfers">Перемещения</a>
    <a href="/sales">Продажи</a>
    <a href="/yandex">Яндекс</a>
  </nav>
</div>

<div class="main">
  <div class="summary" id="summary">
    <div class="sum-card sc-best"><div class="lbl">Бестселлеры</div><div class="cond">&gt; 5 000 &#8381;/день</div><div class="val" id="v-best">&mdash;</div><div class="money" id="m-best"></div><div class="sub" id="s-best"></div></div>
    <div class="sum-card sc-good"><div class="lbl">Хорошие</div><div class="cond">2 000 &ndash; 5 000 &#8381;/день</div><div class="val" id="v-good">&mdash;</div><div class="money" id="m-good"></div><div class="sub" id="s-good"></div></div>
    <div class="sum-card sc-mid"><div class="lbl">Средние</div><div class="cond">1 000 &ndash; 2 000 &#8381;/день</div><div class="val" id="v-mid">&mdash;</div><div class="money" id="m-mid"></div><div class="sub" id="s-mid"></div></div>
    <div class="sum-card sc-bad"><div class="lbl">Слабые</div><div class="cond">&lt; 1 000 &#8381;/день</div><div class="val" id="v-bad">&mdash;</div><div class="money" id="m-bad"></div><div class="sub" id="s-bad"></div></div>
  </div>

  <div class="warn" id="warn"></div>

  <div class="tools">
    <input class="search" id="search" placeholder="Поиск по названию..." oninput="render()">
    <span class="note" id="note"></span>
  </div>

  <div class="twrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tb"><tr><td colspan="6" class="loading">Загружаю данные...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
let allDates=[], stockData={}, SKUS={}, hiddenItems=new Set();
let STORES=[], BYSTORE={}, hasStores=false;
let computed={};

const NON_MERCH=["сертификат","кошелек","sample","сэмпл","упаковоч","пакет","коробк","вешалк","бирк","кофр","наклейк","кейс для","чехол для","нитк","бумага тишью"];
function isMerch(n){ const nl=n.toLowerCase(); return !NON_MERCH.some(k=>nl.includes(k)); }
function fmt(n){ return Math.round(n||0).toLocaleString("ru-RU"); }
function fmtMoney(n){
  n=n||0;
  if(n>=1e6) return (n/1e6).toLocaleString("ru-RU",{maximumFractionDigits:1})+" млн \u20BD";
  if(n>=1e3) return Math.round(n/1e3).toLocaleString("ru-RU")+" тыс \u20BD";
  return Math.round(n).toLocaleString("ru-RU")+" \u20BD";
}
function shortStore(s){
  const sl=s.toLowerCase();
  if(sl.includes("мясницк")) return "Мясницкая";
  if(sl.includes("горохов")) return "Гороховая";
  if(sl.includes("интернет")) return "Интернет-магазин";
  return s;
}

async function loadAll(){
  try{
    const [aRes,tRes,hRes,bRes]=await Promise.all([
      fetch("/api/analytics-data"), fetch("/api/turnover-data"),
      fetch("/api/hidden"), fetch("/api/stocks-bystore")
    ]);
    const a=await aRes.json(), t=await tRes.json();
    allDates=a.dates||[]; stockData=a.stock||{};
    if(t&&t.skus) SKUS=t.skus;
    try{ hiddenItems=new Set(await hRes.json()); }catch(e){}
    try{
      const b=await bRes.json();
      if(b&&b.stores&&b.stores.length){ STORES=b.stores; BYSTORE=b.skus||{}; hasStores=true; }
      else if(b&&b.error){ showWarn("Остатки по складам из МойСклад пока недоступны ("+b.error+") — показан общий остаток из последней загрузки."); }
    }catch(e){ showWarn("Остатки по складам недоступны — показан общий остаток."); }
  }catch(e){
    document.getElementById("tb").innerHTML='<tr><td colspan="6" class="loading">Ошибка загрузки: '+e.message+'</td></tr>';
    throw e;
  }
}

function showWarn(msg){ const w=document.getElementById("warn"); w.textContent=msg; w.style.display="block"; }

function compute(){
  computed={};
  for(const base of Object.keys(stockData)){
    const stripped=base.replace(/\s*\([^)]*\)\s*$/,"").trim();
    if(base!==stripped&&(stockData[stripped]||SKUS[stripped])) continue;
    if(!isMerch(base)) continue;
    const dm=stockData[base]||{};
    const sk=SKUS[base]||{nq:0,nr:0};
    let dis=0,prev=0;
    for(const d of allDates){const s=dm[d]!==undefined?dm[d]:prev;if(s>=3)dis++;prev=s;}
    const turn=dis>0?(sk.nr||0)/dis:0;
    let cs=0;
    for(let i=allDates.length-1;i>=0;i--){if(dm[allDates[i]]!==undefined){cs=dm[allDates[i]];break;}}
    const dsq=dis>0?(sk.nq||0)/dis:0;
    const sup=dsq>0?Math.round(cs/dsq):null;
    const zat=sup!==null?Math.round(sup/90*100):null;
    const needed=Math.round(dsq*90);
    const defq=Math.max(0,needed-cs);
    const defp=needed>0?Math.round(defq/needed*100):0;
    const ap=sk.ap||((sk.nq||0)>0?(sk.nr||0)/sk.nq:0);
    const bs=BYSTORE[base];
    const per=bs?bs.per_store:null;
    const total=bs?bs.total:(hasStores?0:cs);  // при живых данных PG отсутствие = 0
    computed[base]={turn,cs,zat,defq,defp,nr:sk.nr||0,per,total,money:total*ap};
  }
}

function grade(d){
  if(d.nr===0) return "none";
  if(d.turn>=5000) return "best";
  if(d.turn>=2000) return "good";
  if(d.turn>=1000) return "mid";
  return "bad";
}
const GRADE_CLS={best:"rg2",good:"rg1",mid:"ro",bad:"rr",none:"rgr"};

function zatStyle(p){
  if(p===null) return ["rgba(31,31,31,0.08)","—","rgba(31,31,31,0.4)"];
  if(p<=30)  return ["rgba(221,0,4,0.5)",p+"%","#7a0002"];
  if(p<=60)  return ["rgba(75,122,0,0.4)",p+"%","#3c6300"];
  if(p<=100) return ["#4b7a00",p+"%","#f3e9e0"];
  if(p<=120) return ["rgba(75,122,0,0.55)",p+"%","#f3e9e0"];
  if(p<=150) return ["#b99a00",p+"%","#f3e9e0"];
  return ["#dd0004",p+"%","#f3e9e0"];
}
function defClr(p){
  if(p<=30) return "rgba(75,122,0,0.35)";
  if(p<=70) return "rgba(233,208,0,0.5)";
  return "rgba(221,0,4,0.45)";
}

function renderSummary(){
  const acc={best:{q:0,n:0,m:0},good:{q:0,n:0,m:0},mid:{q:0,n:0,m:0},bad:{q:0,n:0,m:0}};
  for(const [b,d] of Object.entries(computed)){
    if(hiddenItems.has(b)) continue;
    let g=grade(d); if(g==="none") g="bad";
    acc[g].q+=d.total; acc[g].n++; acc[g].m+=d.money||0;
  }
  for(const key of ["best","good","mid","bad"]){
    document.getElementById("v-"+key).textContent=fmt(acc[key].q)+" шт";
    document.getElementById("m-"+key).textContent="\u2248 "+fmtMoney(acc[key].m);
    document.getElementById("s-"+key).textContent=acc[key].n+" моделей";
  }
}

function renderHead(){
  let cols='<th>Название</th>';
  if(hasStores){ for(const s of STORES) cols+='<th>'+shortStore(s)+'<span class="sub">шт</span></th>'; }
  else cols+='<th>Остаток<span class="sub">все склады</span></th>';
  cols+='<th>Сток на 90 дн<span class="sub">запас</span></th><th>Недостаток<span class="sub">шт на 90 дн</span></th>';
  document.getElementById("thead").innerHTML='<tr>'+cols+'</tr>';
}

function render(){
  const q=(document.getElementById("search").value||"").toLowerCase();
  const tb=document.getElementById("tb"); tb.innerHTML="";
  const items=Object.entries(computed)
    .filter(function(e){ return !hiddenItems.has(e[0])&&(!q||e[0].toLowerCase().includes(q)); })
    .sort(function(x,y){ return (y[1].turn||0)-(x[1].turn||0); });
  const withS=items.filter(function(e){return e[1].nr>0;}), noS=items.filter(function(e){return e[1].nr===0;});
  const ncols=(hasStores?STORES.length:1)+3;
  if(!items.length){ tb.innerHTML='<tr><td colspan="'+ncols+'" class="loading">Нет данных</td></tr>'; return; }
  const frag=document.createDocumentFragment();
  for(const group of [withS,noS]){
    for(const [base,d] of group){
      const zs=zatStyle(d.zat);
      const tr=document.createElement("tr");
      tr.className=GRADE_CLS[grade(d)];
      let cells='<td>'+base+'</td>';
      if(hasStores){
        const per=d.per||STORES.map(function(){return 0;});
        for(const v of per) cells+='<td><span class="qty '+(v?"":"zero")+'">'+fmt(v)+'</span></td>';
      } else {
        cells+='<td><span class="qty '+(d.total?"":"zero")+'">'+fmt(d.total)+'</span></td>';
      }
      cells+='<td><div class="zbar"><div class="zfill" style="width:'+Math.min(d.zat||0,100)+'%;background:'+zs[0]+'"></div><div class="ztxt" style="color:'+zs[2]+'">'+zs[1]+'</div></div></td>';
      cells+='<td><div class="defwrap"><div class="defbox" style="background:'+defClr(d.defp)+'"></div><span style="font-size:11px;font-weight:600">'+d.defq+'</span></div></td>';
      tr.innerHTML=cells;
      frag.appendChild(tr);
    }
  }
  tb.appendChild(frag);
  document.getElementById("note").textContent=items.length+" позиций · сортировка по оборачиваемости, как на странице «Оборачиваемость»";
}

(async function(){ await loadAll(); compute(); renderSummary(); renderHead(); render(); })();
</script>
</body>
</html>
