<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHERNIM CHERNO — Оборачиваемость</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f1ea;color:#1a1714;min-height:100vh}
:root{
  --bg:#f5f1ea;--card:#ece8e1;--border:#ddd8cf;--text:#1a1714;--muted:#999;
  --red:#c0392b;--orange:#e67e22;--green:#27ae60;--bright:#2ecc71;--dark:#1a1714;
}
/* HEADER */
.header{background:var(--card);border-bottom:2px solid var(--border);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.logo-text{line-height:1}
.logo-text span{display:block;font-family:'Bebas Neue',sans-serif;font-size:26px;
  color:var(--red);letter-spacing:3px}
.logo-wrap{display:flex;align-items:center;gap:14px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:10px}
.btn{padding:5px 14px;background:var(--red);color:#fff;border:none;border-radius:5px;
  cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.update-time{font-size:10px;color:var(--muted)}
/* MAIN */
.main{padding:20px 24px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--card);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.stat-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:4px}
.stat-value{font-size:18px;font-weight:700;color:var(--text);line-height:1.2}
.stat-sub{font-size:11px;color:var(--red);margin-top:2px}
/* LEGEND */
.legend{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.legend-items{display:flex;gap:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.search-input{padding:7px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--card);font-size:12px;color:var(--text);outline:none;width:240px;
  font-family:'DM Sans',sans-serif}
/* NOTICE */
.notice{background:#fff8e8;border:1px solid var(--orange);border-radius:6px;
  padding:8px 14px;font-size:11px;color:#a04000;margin-bottom:16px}
/* LOADING */
.loading{text-align:center;padding:80px 0}
.loading-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--red)}
.loading-sub{font-size:12px;color:var(--muted);margin-top:8px}
.spinner{font-size:32px;margin-top:20px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
/* ERROR */
.error{background:#fde8e8;border:1px solid var(--red);border-radius:8px;
  padding:16px;color:var(--red);font-size:13px;margin-bottom:16px}
/* CATEGORY */
.cat-section{margin-bottom:20px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.cat-header{background:var(--dark);color:#fff;padding:9px 16px;
  font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:4px;
  display:flex;justify-content:space-between;align-items:center}
.cat-count{opacity:0.35;font-size:12px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--card)}
thead tr{background:#f0ece4}
th{padding:6px 10px;font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;
  color:var(--muted);text-align:right;border-bottom:2px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
/* ROWS */
tr.product-row{cursor:pointer;transition:filter 0.1s}
tr.product-row:hover{filter:brightness(0.95)}
tr.no-sales{cursor:default}
td{padding:7px 10px;font-size:11px;text-align:right;border-bottom:1px solid rgba(0,0,0,0.07);white-space:nowrap}
td:first-child{text-align:left;max-width:260px;overflow:hidden;text-overflow:ellipsis;
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px}
td.sub-name{font-size:12px;padding-left:28px}
td.bold{font-weight:700}
/* DETAIL ROW */
tr.detail-row td{padding:0;background:var(--bg)}
.detail-inner{padding:16px 20px 20px;border-bottom:2px solid var(--border);
  display:grid;grid-template-columns:1fr 290px;gap:16px}
/* CHART */
.chart-wrap{background:var(--card);border-radius:10px;padding:12px 14px}
.chart-title{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;
  color:var(--muted);margin-bottom:10px}
canvas.season-chart{width:100%;height:150px}
.chart-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.chart-legend-line{width:18px;height:2px;border-radius:1px}
/* RIGHT PANEL */
.right-panel{display:flex;flex-direction:column;gap:8px}
.panel-card{background:var(--card);border-radius:8px;padding:10px 12px}
.panel-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;
  color:var(--muted);margin-bottom:6px}
.progress-bar{background:#d8d2c8;border-radius:4px;height:22px;position:relative;overflow:hidden}
.progress-fill{height:100%;transition:width 0.5s}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.order-item{background:var(--bg);border-radius:4px;padding:4px 8px;
  display:flex;justify-content:space-between;align-items:center}
.order-season{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted)}
.order-units{font-size:14px;font-weight:700;color:var(--text)}
.total-card{background:var(--dark);border-radius:8px;padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center}
.total-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:#666}
.total-value{font-size:14px;font-weight:700;color:#fff}
/* MOBILE */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-inner{grid-template-columns:1fr}
  .header-title{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-text">
      <span>CHERNIM</span>
      <span>CHERNO</span>
    </div>
    <svg width="36" height="36" viewBox="0 0 300 300" fill="#c0392b">
      <path d="M150 20 C80 20 30 70 20 130 C10 190 50 240 100 255 C85 275 70 295 80 310 C115 285 140 270 150 268 C160 270 185 285 220 310 C230 295 215 275 200 255 C250 240 290 190 280 130 C270 70 220 20 150 20Z"/>
      <ellipse cx="110" cy="155" rx="22" ry="28" fill="#f5f1ea"/>
      <ellipse cx="190" cy="155" rx="22" ry="28" fill="#f5f1ea"/>
      <ellipse cx="110" cy="158" rx="12" ry="14" fill="#1a1714"/>
      <ellipse cx="190" cy="158" rx="12" ry="14" fill="#1a1714"/>
    </svg>
  </div>
  <div class="header-title">АНАЛИТИКА ОБОРАЧИВАЕМОСТИ</div>
  <div class="header-right">
    <span class="update-time" id="update-time"></span>
    <button class="btn" id="refresh-btn" onclick="loadData()">↻ ОБНОВИТЬ</button>
  </div>
</div>

<div class="main">
  <div id="loading" class="loading">
    <div class="loading-title" id="loading-text">ЗАГРУЗКА ДАННЫХ...</div>
    <div class="loading-sub">Читаем данные из Google Sheets</div>
    <div class="spinner">◉</div>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <div id="dashboard" style="display:none">
    <div class="stats" id="stats"></div>
    <div class="legend">
      <div class="legend-items">
        <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>≥5000 ₽/день</div>
        <div class="legend-item"><div class="legend-dot" style="background:#52be80"></div>2000–5000</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>1000–2000</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>&lt;1000</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ccc"></div>нет продаж</div>
      </div>
      <input class="search-input" id="search" placeholder="Поиск товара или артикула..." oninput="filterProducts()">
    </div>
    <div class="notice">⚠ Колонки «Остаток» и «Запас дней» будут заполнены после подключения листа «Ассортимент» из МойСклад.</div>
    <div id="tables"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const CSV_SALES  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6GemsdZe7qvMO-yY3YOmtHyFjvkFMFGKsWlHhNonDxWsTP30VPGDCOHe5wvds2XGo7kpsSK5NR_0_/pub?gid=1091364786&single=true&output=csv';
const CSV_INTAKE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6GemsdZe7qvMO-yY3YOmtHyFjvkFMFGKsWlHhNonDxWsTP30VPGDCOHe5wvds2XGo7kpsSK5NR_0_/pub?gid=247039199&single=true&output=csv';

const SEASONS = ['Весна','Лето','Осень','Зима'];
const SEASON_MONTHS = {Весна:[2,3,4],Лето:[5,6,7],Осень:[8,9,10],Зима:[11,0,1]};
const EXCLUDE = ['sample','брак','списан','комиссион','подарочный сертификат','gift card'];
const CATEGORIES = ['Верхняя одежда','Костюмы','Брюки','Рубашки','Свитера','Шорты',
  'Худи и свитшоты','Майки','Футболки','Аксессуары Сумки','Очки','Украшения','Нижнее бельё','Обувь','Прочее'];

let allProducts = [];

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitCSVLine(line) {
  const vals = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { vals.push(cur); cur = ''; continue; }
    cur += ch;
  }
  vals.push(cur);
  return vals;
}

// Parse Russian date: "21.10.2025 16:00" or "21.10.2025"
function parseRuDate(str) {
  if (!str || !str.trim()) return null;
  const m = str.trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if (m) {
    const day=parseInt(m[1]),mon=parseInt(m[2])-1,yr=parseInt(m[3]);
    const hr=m[4]?parseInt(m[4]):0,mn=m[5]?parseInt(m[5]):0;
    return new Date(yr,mon,day,hr,mn);
  }
  const native = new Date(str);
  return isNaN(native.getTime()) ? null : native;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function seasonOf(month) {
  for (const [s,ms] of Object.entries(SEASON_MONTHS)) if (ms.includes(month)) return s;
  return null;
}

function categoryFromGroup(group) {
  const g = (group||'').toLowerCase();
  if (g.includes('shirt') && !g.includes('t-shirt') && !g.includes('tshirt')) return 'Рубашки';
  if (g.includes('t-shirt') || g.includes('tshirt') || g.includes('t_shirt')) return 'Футболки';
  if (g.includes('майка') || g.includes('tank') || g.includes('майки')) return 'Майки';
  if (g.includes('pant') || g.includes('jean') || g.includes('брюки') || g.includes('pants')) return 'Брюки';
  if (g.includes('sweater') || g.includes('свитер') || g.includes('knit')) return 'Свитера';
  if (g.includes('hoodie') || g.includes('sweatshirt') || g.includes('худи')) return 'Худи и свитшоты';
  if (g.includes('short') || g.includes('шорт')) return 'Шорты';
  if (g.includes('bomber') || g.includes('jacket') || g.includes('coat') || g.includes('куртк') || g.includes('пальто')) return 'Верхняя одежда';
  if (g.includes('blazer') || g.includes('suit') || g.includes('костюм') || g.includes('пиджак')) return 'Костюмы';
  if (g.includes('bag') || g.includes('сумк')) return 'Аксессуары Сумки';
  if (g.includes('jewel') || g.includes('ring') || g.includes('украш') || g.includes('кольц')) return 'Украшения';
  if (g.includes('glass') || g.includes('очки') || g.includes('sunglass')) return 'Очки';
  if (g.includes('underwear') || g.includes('бельё') || g.includes('boxer') || g.includes('бриф')) return 'Нижнее бельё';
  if (g.includes('shoe') || g.includes('обувь') || g.includes('sneaker') || g.includes('boot')) return 'Обувь';
  return 'Прочее';
}

function tColor(v) {
  if (!v || v === 0) return {bg:'#ccc8c0',text:'#777'};
  if (v >= 5000) return {bg:'#27ae60',text:'#fff'};
  if (v >= 2000) return {bg:'#52be80',text:'#fff'};
  if (v >= 1000) return {bg:'#e67e22',text:'#fff'};
  return {bg:'#c0392b',text:'#fff'};
}

function overstockColor(pct) {
  if (pct < 30) return '#c0392b';
  if (pct < 60) return '#27ae60';
  if (pct < 100) return '#2ecc71';
  if (pct < 120) return '#27ae60';
  if (pct < 150) return '#e67e22';
  return '#c0392b';
}

function fmtRub(v) { return v ? Math.round(v).toLocaleString('ru') + ' ₽' : '—'; }
function fmtNum(v) { return v ? Math.round(v).toLocaleString('ru') : '—'; }

// ── DATA PROCESSING ───────────────────────────────────────────────────────────
function processData(salesRows, intakeRows) {
  const now = new Date();
  const cutoff = new Date(now - 365*86400000);
  const byArt = {};

  for (const row of salesRows) {
    const dateStr = row['Дата документа'] || row['Дата'] || '';
    const date = parseRuDate(dateStr);
    if (!date || date < cutoff) continue;

    const name = (row['Наименование']||'').trim();
    const nameLow = name.toLowerCase();
    if (!name || EXCLUDE.some(e => nameLow.includes(e))) continue;

    const art = (row['Артикул']||row['Код']||'').trim();
    if (!art) continue;

    const sum = parseFloat((row['Сумма']||'0').replace(/\s/g,'').replace(',','.')) || 0;
    const disc = parseFloat((row['Сумма скидки']||'0').replace(/\s/g,'').replace(',','.')) || 0;
    const qty = parseFloat((row['Количество']||'1').replace(',','.')) || 1;
    const price = parseFloat((row['Цена']||'0').replace(/\s/g,'').replace(',','.')) || 0;
    const effSum = sum - disc;
    const month = date.getMonth();
    const season = seasonOf(month);

    if (!byArt[art]) {
      byArt[art] = {art, name, group: row['Группа']||'', totalSum:0, totalQty:0,
        seasonSum:{Весна:0,Лето:0,Осень:0,Зима:0}, dates:[]};
    }
    byArt[art].totalSum += effSum;
    byArt[art].totalQty += qty;
    byArt[art].dates.push(date);
    if (season) byArt[art].seasonSum[season] += effSum;
  }

  // Intake map
  const intakeByArt = {};
  for (const row of intakeRows) {
    const art = (row['Артикул']||row['Код']||'').trim();
    if (!art) continue;
    const name = (row['Наименование']||'').toLowerCase();
    if (EXCLUDE.some(e => name.includes(e))) continue;
    const date = parseRuDate(row['Дата документа']||row['Дата']||'');
    if (!date) continue;
    if (!intakeByArt[art]) intakeByArt[art] = [];
    intakeByArt[art].push(date);
  }

  const products = [];
  for (const [art, d] of Object.entries(byArt)) {
    const avgPrice = d.totalQty > 0 ? d.totalSum / d.totalQty : 0;
    const intakeDates = intakeByArt[art] || [];
    const allDates = [...intakeDates, ...d.dates];
    const firstDate = allDates.length > 0 ? new Date(Math.min(...allDates.map(x=>x.getTime()))) : null;
    const daysInStock = firstDate ? Math.max(1, Math.round((now-firstDate)/86400000)) : 365;
    const turnover = daysInStock > 0 && d.totalSum > 0 ? d.totalSum / daysInStock : 0;

    const seasonTurnover = {};
    for (const s of SEASONS) seasonTurnover[s] = d.seasonSum[s] > 0 ? d.seasonSum[s]/91 : 0;

    products.push({
      art, name: d.name, group: d.group,
      category: categoryFromGroup(d.group),
      avgPrice: Math.round(avgPrice),
      turnover: Math.round(turnover * 10) / 10,
      daysInStock,
      totalSum: Math.round(d.totalSum),
      stock: 0, stockDays: 0, selloutDate: '',
      seasonTurnover,
    });
  }

  const byCat = {};
  for (const p of products) {
    if (!byCat[p.category]) byCat[p.category] = [];
    byCat[p.category].push(p);
  }
  for (const cat of Object.keys(byCat)) {
    byCat[cat].sort((a,b) => b.turnover - a.turnover);
  }
  return byCat;
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart(canvas, p) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 400;
  const H = 150;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const c = canvas.getContext('2d');
  c.scale(dpr, dpr);

  const pad = {top:10, right:10, bottom:22, left:44};
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const vals = SEASONS.map(s => Math.max(p.seasonTurnover[s]||0, 1));
  const maxV = Math.max(...vals, 200);
  const logMax = Math.log10(maxV);
  const logY = v => pad.top + cH - (Math.log10(Math.max(v,1)) / logMax) * cH;
  const xPos = i => pad.left + (i / (SEASONS.length-1)) * cW;

  // Zone backgrounds
  const zones = [{y:1,c:'rgba(192,57,43,0.12)'},{y:1000,c:'rgba(231,126,34,0.12)'},
    {y:2000,c:'rgba(39,174,96,0.12)'},{y:5000,c:'rgba(46,204,113,0.12)'}];
  zones.forEach((z,i) => {
    const y1 = logY(z.y);
    const y2 = i+1 < zones.length ? logY(zones[i+1].y) : pad.top;
    c.fillStyle = z.c;
    c.fillRect(pad.left, Math.min(y1,y2), cW, Math.abs(y1-y2));
  });

  // Grid lines
  [1000,2000,5000].forEach(v => {
    const y = logY(v);
    if (y > pad.top && y < H - pad.bottom) {
      c.setLineDash([4,4]);
      c.strokeStyle = 'rgba(0,0,0,0.15)';
      c.lineWidth = 1;
      c.beginPath(); c.moveTo(pad.left, y); c.lineTo(W-pad.right, y); c.stroke();
      c.setLineDash([]);
      c.fillStyle = '#aaa'; c.font = '8px DM Sans'; c.textAlign = 'right';
      c.fillText((v/1000)+'k', pad.left-4, y+3);
    }
  });

  // Line
  c.strokeStyle = '#c0392b'; c.lineWidth = 2.5; c.lineJoin = 'round';
  c.beginPath();
  vals.forEach((v,i) => {
    const x = xPos(i), y = logY(v);
    i === 0 ? c.moveTo(x,y) : c.lineTo(x,y);
  });
  c.stroke();

  // Dots + labels
  vals.forEach((v,i) => {
    const x = xPos(i), y = logY(v);
    c.fillStyle = '#fff'; c.beginPath(); c.arc(x,y,5,0,Math.PI*2); c.fill();
    c.fillStyle = '#c0392b'; c.beginPath(); c.arc(x,y,3,0,Math.PI*2); c.fill();
    c.fillStyle = '#666'; c.font = '9px Bebas Neue,sans-serif';
    c.textAlign = 'center'; c.letterSpacing = '1px';
    c.fillText(SEASONS[i], x, H-6);
  });
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderDashboard(byCat) {
  // Stats
  const all = Object.values(byCat).flat();
  allProducts = all;
  const totalT = all.reduce((a,p)=>a+p.turnover,0);
  const totalS = all.reduce((a,p)=>a+p.totalSum,0);
  const top = [...all].sort((a,b)=>b.turnover-a.turnover)[0];

  document.getElementById('stats').innerHTML = [
    {l:'ТОВАРОВ',v:all.length},
    {l:'ОБОРАЧИВАЕМОСТЬ',v:Math.round(totalT).toLocaleString('ru')+' ₽/день'},
    {l:'ВЫРУЧКА ЗА ГОД',v:Math.round(totalS).toLocaleString('ru')+' ₽'},
    {l:'ТОП ТОВАР',v:top?top.name.slice(0,30)+(top.name.length>30?'…':''):'—',sub:top?Math.round(top.turnover).toLocaleString('ru')+' ₽/день':''},
  ].map(s=>`<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value">${s.v}</div>${s.sub?`<div class="stat-sub">${s.sub}</div>`:''}</div>`).join('');

  // Tables
  const tablesEl = document.getElementById('tables');
  tablesEl.innerHTML = '';

  for (const cat of CATEGORIES) {
    const prods = byCat[cat];
    if (!prods || prods.length === 0) continue;
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.dataset.cat = cat;

    sec.innerHTML = `
      <div class="cat-header">
        <span>${cat.toUpperCase()}</span>
        <span class="cat-count">${prods.length} ПОЗ.</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left">Наименование</th>
            <th>Дней в наличии</th><th>Ср. цена</th><th>Оборачиваемость</th>
            <th>Весна</th><th>Лето</th><th>Осень</th><th>Зима</th>
            <th>Остаток</th><th>Запас дней</th>
          </tr></thead>
          <tbody id="tbody-${cat.replace(/\s/g,'_')}"></tbody>
        </table>
      </div>`;
    tablesEl.appendChild(sec);

    const tbody = sec.querySelector('tbody');
    for (const p of prods) renderProductRow(tbody, p);
  }
}

function renderProductRow(tbody, p) {
  const tc = tColor(p.turnover);
  const noSales = !p.turnover || p.turnover === 0;
  const id = 'p_' + p.art.replace(/[^a-zA-Z0-9]/g,'_');

  const seasonCells = SEASONS.map(s =>
    `<td style="color:${tc.text}">${p.seasonTurnover[s] ? Math.round(p.seasonTurnover[s]).toLocaleString('ru')+' ₽' : '—'}</td>`
  ).join('');

  const tr = document.createElement('tr');
  tr.className = noSales ? 'no-sales' : 'product-row';
  tr.style.background = tc.bg;
  tr.innerHTML = `
    <td style="color:${tc.text};font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px">
      ${!noSales ? '<span style="font-size:9px;opacity:0.5;margin-right:6px">▶</span>' : ''}${p.name}
    </td>
    <td style="color:${tc.text}">${p.daysInStock||'—'}</td>
    <td style="color:${tc.text}">${p.avgPrice ? p.avgPrice.toLocaleString('ru')+' ₽' : '—'}</td>
    <td style="color:${tc.text};font-weight:700">${p.turnover ? Math.round(p.turnover).toLocaleString('ru')+' ₽' : '—'}</td>
    ${seasonCells}
    <td style="color:${tc.text}">${p.stock||'—'}</td>
    <td style="color:${tc.text}">${p.stockDays ? Math.round(p.stockDays)+' дн.' : '—'}</td>`;

  if (!noSales) {
    tr.onclick = () => toggleDetail(tr, p, id);
  }
  tbody.appendChild(tr);
}

function toggleDetail(tr, p, id) {
  const existing = document.getElementById('detail_'+id);
  const arrow = tr.querySelector('span');
  if (existing) {
    existing.remove();
    if (arrow) arrow.textContent = '▶';
    return;
  }
  if (arrow) arrow.textContent = '▼';

  const overstockPct = p.stockDays ? Math.round((p.stockDays/90)*100) : 0;
  const shortfallPct = Math.max(0, 100 - overstockPct);
  const shortfallUnits = shortfallPct > 0 && p.stock > 0 ? Math.ceil(shortfallPct/100*p.stock) : 0;
  const oc = overstockColor(overstockPct);
  const scPct = shortfallPct <= 30 ? '#27ae60' : shortfallPct <= 70 ? '#e67e22' : '#c0392b';

  const orderItems = SEASONS.map(s => {
    const units = p.seasonTurnover[s] && p.avgPrice ? Math.ceil(p.seasonTurnover[s]/p.avgPrice*90) : 0;
    return `<div class="order-item">
      <span class="order-season">${s}</span>
      <span class="order-units" style="color:${units>0?'#1a1714':'#bbb'}">${units||'—'}</span>
    </div>`;
  }).join('');

  const detailTr = document.createElement('tr');
  detailTr.id = 'detail_'+id;
  detailTr.className = 'detail-row';
  detailTr.innerHTML = `<td colspan="10">
    <div class="detail-inner">
      <div class="chart-wrap">
        <div class="chart-title">ДИНАМИКА ОБОРАЧИВАЕМОСТИ · ₽/ДЕНЬ · ЛОГАРИФМИЧЕСКАЯ ШКАЛА</div>
        <canvas class="season-chart" id="canvas_${id}"></canvas>
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#c0392b"></div>&lt;1000 ₽</div>
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#e67e22"></div>1000–2000</div>
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#27ae60"></div>2000–5000</div>
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#2ecc71"></div>≥5000</div>
        </div>
      </div>
      <div class="right-panel">
        <div class="panel-card">
          <div class="panel-label">ЗАТОВАРИВАНИЕ · 90 ДНЕЙ = 100%</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${Math.min(overstockPct,100)}%;background:${oc}"></div>
            <div class="progress-text">${p.selloutDate?p.selloutDate+' · ':''}${overstockPct}%</div>
          </div>
        </div>
        <div class="panel-card">
          <div class="panel-label">НЕДОСТАТОК</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${Math.min(shortfallPct,100)}%;background:${scPct}"></div>
            <div class="progress-text">${shortfallUnits>0?shortfallPct+'% · '+shortfallUnits+' ед.':'0% · норма'}</div>
          </div>
        </div>
        <div class="panel-card">
          <div class="panel-label">ЗАКАЗ НА СЕЗОН · 90 ДНЕЙ</div>
          <div class="order-grid">${orderItems}</div>
        </div>
        <div class="total-card">
          <span class="total-label">ВЫРУЧКА ЗА ГОД</span>
          <span class="total-value">${p.totalSum.toLocaleString('ru')} ₽</span>
        </div>
      </div>
    </div>
  </td>`;

  tr.after(detailTr);
  setTimeout(() => {
    const canvas = document.getElementById('canvas_'+id);
    if (canvas) drawChart(canvas, p);
  }, 50);
}

function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('tr.product-row, tr.no-sales').forEach(tr => {
    const name = tr.querySelector('td')?.textContent?.toLowerCase() || '';
    tr.style.display = name.includes(q) ? '' : 'none';
  });
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('refresh-btn').disabled = true;

  try {
    document.getElementById('loading-text').textContent = 'ЗАГРУЖАЕМ ПРОДАЖИ...';
    const [r1, r2] = await Promise.all([
      fetch(CSV_SALES + '&t=' + Date.now()).then(r => { if(!r.ok) throw new Error('Ошибка загрузки продаж: ' + r.status); return r.text(); }),
      fetch(CSV_INTAKE + '&t=' + Date.now()).then(r => { if(!r.ok) throw new Error('Ошибка загрузки приёмок: ' + r.status); return r.text(); }),
    ]);

    document.getElementById('loading-text').textContent = 'ОБРАБАТЫВАЕМ ДАННЫЕ...';
    const sales = parseCSV(r1);
    const intake = parseCSV(r2);
    const byCat = processData(sales, intake);

    renderDashboard(byCat);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('update-time').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.innerHTML = '⚠ ' + e.message + ' <button class="btn" onclick="loadData()" style="margin-left:10px;font-size:11px">Повторить</button>';
  } finally {
    document.getElementById('refresh-btn').disabled = false;
  }
}

// Auto-refresh every 10 min
setInterval(loadData, 10 * 60 * 1000);
loadData();
</script>
