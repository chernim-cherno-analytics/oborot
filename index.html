// CSV parser
function csv(text) {
var lines = text.trim().split(’\n’), res = [];
if (lines.length < 2) return res;
var hdrs = splitL(lines[0]);
for (var i = 1; i < lines.length; i++) {
var v = splitL(lines[i]), o = {};
for (var j = 0; j < hdrs.length; j++) o[hdrs[j].trim()] = (v[j]||’’).trim();
if (Object.values(o).some(function(x){return x;})) res.push(o);
}
return res;
}
function splitL(s) {
var vals=[], cur=’’, q=false;
for (var i=0;i<s.length;i++){var c=s[i];if(c===’”’){q=!q;}else if(c===’,’&&!q){vals.push(cur);cur=’’;}else cur+=c;}
vals.push(cur); return vals;
}
function pd(s) {
if (!s) return null; s=s.trim();
var m=s.match(/^(\d{1,2}).(\d{1,2}).(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
if (m) return new Date(+m[3],+m[2]-1,+m[1],m[4]?+m[4]:0,m[5]?+m[5]:0);
var d=new Date(s); return isNaN(d)?null:d;
}
function seasonOf(mo) { for(var s in SM) if(SM[s].indexOf(mo)>=0) return s; return null; }
function excl(name) { var n=name.toLowerCase(); return EXCL.some(function(e){return n.includes(e);}); }

function catOf(g) {
g=(g||’’).toLowerCase();
if ((g.includes(‘shirt’)||g.includes(‘рубашк’))&&!g.includes(‘t-shirt’)&&!g.includes(‘tshirt’)) return ‘Рубашки’;

if (g.includes(‘blazer’)||g.includes(‘suit’)||g.includes(‘костюм’)||g.includes(‘пиджак’)) return ‘Костюмы’;

if (g.includes(‘shoe’)||g.includes(‘обувь’)||g.includes(‘sneaker’)) return ‘Обувь’;
return ‘Прочее’;
}

// Count days where running stock > 0, within [from, to]
function daysInRange(events, from, to) {
if (!events||!events.length) return 0;
var evs = events.filter(function(e){return e.d<=to;}).sort(function(a,b){return a.d-b.d;});
var stock=0, days=0, prev=null;
for (var i=0;i<evs.length;i++) {
var ev=evs[i], d=ev.d;
if (prev!==null && stock>0) {
var s=Math.max(from,prev), e2=Math.min(to,d);
if (e2>s) days+=Math.round((e2-s)/86400000);
}
stock=Math.max(0,stock+ev.q);
prev=d;
}
// remaining
if (prev!==null && stock>0) {
var s=Math.max(from,prev);
if (to>s) days+=Math.round((to-s)/86400000);
}
return days;
}

function processData(sR,iR,mR,rR) {
var now=new Date(), y365=new Date(now-365*864e5);
var events={}, meta={};

function addEv(art,d,q,name,group) {
if (!art||!d||q===0) return;

events[art].push({d:d,q:q});
if (name&&!meta[art]) meta[art]={name:name,group:group||’’};
}

// Intakes +
for (var i=0;i<iR.length;i++) {
var r=iR[i], art=(r[‘Артикул’]||r[‘Код’]||’’).trim(), name=(r[‘Наименование’]||’’).trim();

if (d&&q>0) addEv(art,d,q,name,r[‘Группа’]||’’);
}

// Returns +
for (var i=0;i<rR.length;i++) {
var r=rR[i], art=(r[‘Артикул’]||r[‘Код’]||’’).trim(), name=(r[‘Наименование’]||’’).trim();
if (!art||excl(name)) continue;
var d=pd(r[‘Дата документа’]||r[‘Дата’]||’’);

if (d&&q>0) addEv(art,d,q,name,r[‘Группа’]||’’);
}

// Sales - (negative)
var sales={};
for (var i=0;i<sR.length;i++) {
var r=sR[i];

if (!d||d<y365) continue;
var art=(r[‘Артикул’]||r[‘Код’]||’’).trim(), name=(r[‘Наименование’]||’’).trim();
if (!art||!name||excl(name)) continue;
var q=parseFloat((r[‘Количество’]||‘0’).replace(’,’,’.’))||0;
var sum=parseFloat((r[‘Сумма’]||‘0’).replace(/\s/g,’’).replace(’,’,’.’))||0;
var disc=parseFloat((r[‘Сумма скидки’]||‘0’).replace(/\s/g,’’).replace(’,’,’.’))||0;
var eff=Math.max(0,sum-disc);
var sn=seasonOf(d.getMonth());
addEv(art,d,-q,name,r[‘Группа’]||’’);
if (!sales[art]) sales[art]={sum:0,qty:0,ss:{Весна:0,Лето:0,Осень:0,Зима:0},lastSale:null,name:name,group:r[‘Группа’]||’’};
sales[art].sum+=eff;
sales[art].qty+=q;
if (sn) sales[art].ss[sn]+=eff;
if (!sales[art].lastSale||d>sales[art].lastSale) sales[art].lastSale=d;
}

// Moves - only to БРАК
for (var i=0;i<mR.length;i++) {
var r=mR[i], art=(r[‘Артикул’]||r[‘Код’]||’’).trim(), name=(r[‘Наименование’]||’’).trim();
if (!art) continue;
var dest=(r[‘Склад назначения’]||r[‘Куда’]||r[‘На склад’]||’’).toLowerCase();
var isBrak=dest.includes(‘брак’)||name.toLowerCase().includes(‘брак’);
if (!isBrak) continue;
var d=pd(r[‘Дата документа’]||r[‘Дата’]||’’);
var q=parseFloat((r[‘Количество’]||‘0’).replace(’,’,’.’))||0;
if (d&&q>0) addEv(art,d,-q,name,r[‘Группа’]||’’);
}

var products=[], now=new Date(), d90=new Date(now-90*864e5);

for (var art in sales) {
var sd=sales[art], evs=events[art]||[], m=meta[art]||sd;
var avgP=sd.qty>0?sd.sum/sd.qty:0;

var dis=daysInRange(evs,y365,now);
if (dis<1) dis=1;

// Turnover = sales / days in stock (min 0)

// Season turnover

for (var si=0;si<SEASONS.length;si++) {

var x=xP(i),y=logY(v);
c.fillStyle=’#fff’;c.beginPath();c.arc(x,y,5,0,Math.PI*2);c.fill();
c.fillStyle=’#c0392b’;c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();
c.fillStyle=’#666’;c.font=‘9px sans-serif’;c.textAlign=‘center’;c.fillText(SEASONS[i],x,H-6);
});
}

function renderDash(byCat) {
var all=[];for(var k in byCat)all=all.concat(byCat[k]);
var active=all.filter(function(p){return p.active;});
var totT=active.reduce(function(a,p){return a+p.turnover;},0);
var totS=all.reduce(function(a,p){return a+p.totalSum;},0);
var top=active.slice().sort(function(a,b){return b.turnover-a.turnover;})[0];
document.getElementById(‘stats’).innerHTML=[
{l:‘ТОВАРОВ’,v:all.length+’ (акт: ‘+active.length+’)’},
{l:‘ОБОРАЧИВАЕМОСТЬ’,v:Math.round(totT).toLocaleString(‘ru’)+’ руб/день’},
{l:‘ВЫРУЧКА ЗА ГОД’,v:Math.round(totS).toLocaleString(‘ru’)+’ руб’},
{l:‘ТОП ТОВАР’,v:top?top.name.slice(0,28)+(top.name.length>28?’…’:’’):’—’,sub:top?Math.round(top.turnover).toLocaleString(‘ru’)+’ руб/день’:’’}
].map(function(s){return ‘<div class="sc"><div class="sl">’+s.l+’</div><div class="sv">’+s.v+’</div>’+(s.sub?’<div class="ss">’+s.sub+’</div>’:’’)+’</div>’;}).join(’’);

var el=document.getElementById(‘tables’);el.innerHTML=’’;
for (var ci=0;ci<CATS.length;ci++) {
var cat=CATS[ci], prods=byCat[cat];
if (!prods||!prods.length) continue;
var sec=document.createElement(‘div’);sec.className=‘cat-sec’;
sec.innerHTML=’<div class="cat-hdr"><span>’+cat.toUpperCase()+’</span><span class="cat-cnt">’+prods.length+’ ПОЗ.</span></div>’
+’<div class="tw"><table><thead><tr>’
+’<th style="text-align:left">Наименование</th><th>Дней в наличии</th><th>Ср. цена</th><th>Оборачиваемость</th>’
+’<th>Весна</th><th>Лето</th><th>Осень</th><th>Зима</th><th>Остаток</th><th>Запас дней</th>’
+’</tr></thead><tbody id="tb'+ci+'"></tbody></table></div>’;
el.appendChild(sec);
var tb=document.getElementById(‘tb’+ci);
for (var pi=0;pi<prods.length;pi++) renderRow(tb,prods[pi],ci+’_’+pi);
}
}

function renderRow(tb,p,id) {
var tc=tcol(p.turnover,p.active), noS=!p.active||!p.turnover;
var sCells=SEASONS.map(function(s){var v=p.seasonTurnover[s];return ‘<td style="color:'+tc.fg+'">’+(v&&p.active?Math.round(v).toLocaleString(‘ru’)+’ р’:’—’)+’</td>’;}).join(’’);
var tr=document.createElement(‘tr’);
tr.className=noS?‘ns’:‘pr’;tr.style.background=tc.bg;
tr.innerHTML=’<td style="color:'+tc.fg+';opacity:'+(p.active?1:0.7)+'">’
+((!noS)?’<span style="font-size:9px;opacity:0.4;margin-right:5px">►</span>’:’’)
+p.name+((!p.active)?’ <span style="font-size:9px;opacity:0.5">[нет в наличии]</span>’:’’)
+’</td>’
+’<td style="color:'+tc.fg+'">’+p.daysInStock+’</td>’
+’<td style="color:'+tc.fg+'">’+(p.avgPrice?p.avgPrice.toLocaleString(‘ru’)+’ р’:’—’)+’</td>’
+’<td style="color:'+tc.fg+';font-weight:700">’+(p.turnover&&p.active?Math.round(p.turnover).toLocaleString(‘ru’)+’ р’:’—’)+’</td>’
+sCells
+’<td style="color:'+tc.fg+'">’+(p.stock||’—’)+’</td>’
+’<td style="color:'+tc.fg+'">’+(p.stockDays?Math.round(p.stockDays)+’ дн.’:’—’)+’</td>’;
if (!noS) tr.onclick=function(){toggleDet(tr,p,id);};
tb.appendChild(tr);
}

function toggleDet(tr,p,id) {
var ex=document.getElementById(‘d_’+id);
var arr=tr.querySelector(‘span’);
if (ex){ex.remove();if(arr)arr.innerHTML=’►’;return;}
if (arr) arr.innerHTML=’▼’;
var op=p.stockDays?Math.round((p.stockDays/90)*100):0;
var sp=Math.max(0,100-op), su=sp>0&&p.stock>0?Math.ceil(sp/100*p.stock):0;
var oc=ocol(op), sc=sp<=30?’#27ae60’:sp<=70?’#e67e22’:’#c0392b’;
var ord=SEASONS.map(function(s){var u=p.seasonTurnover[s]&&p.avgPrice?Math.ceil(p.seasonTurnover[s]/p.avgPrice*90):0;return ‘<div class="oi"><span class="os">’+s+’</span><span class="ov" style="color:'+(u?'#1a1714':'#bbb')+'">’+( u||’—’)+’</span></div>’;}).join(’’);
var dt=document.createElement(‘tr’);dt.id=‘d_’+id;dt.className=‘detail-row’;
dt.innerHTML=’<td colspan="10"><div class="det">’
+’<div class="cw"><div class="ct">ОБОРАЧИВАЕМОСТЬ ПО СЕЗОНАМ / РУБ В ДЕНЬ / ЛОГ. ШКАЛА</div><canvas class="cv" id="cv_'+id+'"></canvas></div>’
+’<div class="rp"><div class="pc"><div class="pl">ЗАТОВАРИВАНИЕ (90 ДНЕЙ = 100%)</div><div class="pb"><div class="pf" style="width:'+Math.min(op,100)+'%;background:'+oc+'"></div><div class="pt">’+op+’%’+(p.selloutDate?’ · ‘+p.selloutDate:’’)+’</div></div></div>’
+’<div class="pc"><div class="pl">НЕДОСТАТОК</div><div class="pb"><div class="pf" style="width:'+Math.min(sp,100)+'%;background:'+sc+'"></div><div class="pt">’+(su>0?sp+’% · ‘+su+’ ед.’:‘0% норма’)+’</div></div></div>’
+’<div class="pc"><div class="pl">ЗАКАЗ НА СЕЗОН (90 ДНЕЙ)</div><div class="og">’+ord+’</div></div>’
+’<div class="tc"><span class="tl">ВЫРУЧКА ЗА ГОД</span><span class="tv">’+p.totalSum.toLocaleString(‘ru’)+’ руб</span></div>’
+’</div></div></td>’;
tr.after(dt);
setTimeout(function(){var cv=document.getElementById(‘cv_’+id);if(cv)drawChart(cv,p);},50);
}

function filterRows() {
var q=document.getElementById(‘srch’).value.toLowerCase();
document.querySelectorAll(‘tr.pr,tr.ns’).forEach(function(tr){
var t=(tr.querySelector(‘td’)||{}).textContent||’’;
tr.style.display=t.toLowerCase().includes(q)?’’:‘none’;
});
}

async function loadData() {
document.getElementById(‘loading’).style.display=‘block’;
document.getElementById(‘dash’).style.display=‘none’;
document.getElementById(‘errbox’).style.display=‘none’;
document.getElementById(‘rbtn’).disabled=true;
try {
var t=’&t=’+Date.now();
document.getElementById(‘ltxt’).textContent=‘ЗАГРУЖАЕМ ДАННЫЕ…’;
var results=await Promise.all([
fetch(U_SALES+t).then(function(r){if(!r.ok)throw new Error(‘Ошибка продаж’);return r.text();}),
fetch(U_INTAKE+t).then(function(r){if(!r.ok)throw new Error(‘Ошибка приёмок’);return r.text();}),
fetch(U_MOVES+t).then(function(r){if(!r.ok)throw new Error(‘Ошибка перемещений’);return r.text();}),
fetch(U_RETURNS+t).then(function(r){if(!r.ok)throw new Error(‘Ошибка возвратов’);return r.text();})
]);
document.getElementById(‘ltxt’).textContent=‘ОБРАБАТЫВАЕМ…’;
var byCat=processData(csv(results[0]),csv(results[1]),csv(results[2]),csv(results[3]));
renderDash(byCat);
document.getElementById(‘loading’).style.display=‘none’;
document.getElementById(‘dash’).style.display=‘block’;
document.getElementById(‘upd’).textContent=’Обновлено: ’+new Date().toLocaleTimeString(‘ru’);
} catch(e) {
document.getElementById(‘loading’).style.display=‘none’;
var eb=document.getElementById(‘errbox’);eb.style.display=‘block’;
eb.innerHTML=‘Ошибка: ‘+e.message+’ <button class="btn" onclick="loadData()">Повторить</button>’;
} finally {
document.getElementById(‘rbtn’).disabled=false;
}
}

setInterval(loadData,10*60*1000);
loadData();
</script>
