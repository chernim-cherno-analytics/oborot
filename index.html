for(var a in sal){

var ap=sd.qty>0?sd.sum/sd.qty:0;
var dis=daysIn(ev,y365,now2);if(dis<1)dis=1;
var turn=Math.max(0,sd.sum/dis);
var st={};
for(var si=0;si<SNS.length;si++){
var s=SNS[si],ms=SMO[s],ss=sd.ss[s]||0,sd2=0;
for(var y=y365.getFullYear();y<=now2.getFullYear();y++){
var sf,st2;
if(s===SNS[3]){sf=new Date(y,11,1);st2=new Date(y+1,2,1);}
else{sf=new Date(y,ms[0],1);st2=new Date(y,ms[ms.length-1]+1,1);}
var f2=new Date(Math.max(sf.getTime(),y365.getTime())),t2=new Date(Math.min(st2.getTime(),now2.getTime()));
if(t2>f2)sd2+=daysIn(ev,f2,t2);
}
st[s]=ss>0&&sd2>0?Math.max(0,ss/sd2):0;
}
var act=sd.last&&sd.last>=d90;
prods.push({a:a,n:m.n,g:m.g,cat:catOf(m.g),ap:Math.round(ap),turn:Math.round(turn*10)/10,dis:dis,tot:Math.round(sd.sum),stk:0,sd:0,sdt:’’,st:st,act:act});
}
var bc={};
for(var i=0;i<prods.length;i++){var p=prods[i];if(!bc[p.cat])bc[p.cat]=[];bc[p.cat].push(p);}
for(var c in bc)bc[c].sort(function(a,b){if(a.act&&!b.act)return -1;if(!a.act&&b.act)return 1;return b.turn-a.turn;});
return bc;
}

function drawCh(cv,p){
var dpr=window.devicePixelRatio||1,W=cv.offsetWidth||400,H=150;
cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+‘px’;cv.style.height=H+‘px’;
var c=cv.getContext(‘2d’);c.scale(dpr,dpr);
var pl=44,pr=10,pt=10,pb=22,cW=W-pl-pr,cH=H-pt-pb;
var vals=SNS.map(function(s){return Math.max(p.st[s]||0,1);});
var mx=Math.max.apply(null,vals.concat([200])),lm=Math.log10(mx);
var lY=function(v){return pt+cH-(Math.log10(Math.max(v,1))/lm)*cH;};
var xP=function(i){return pl+(i/(SNS.length-1))*cW;};
[{y:1,cl:‘rgba(192,57,43,0.12)’},{y:1000,cl:‘rgba(231,126,34,0.12)’},{y:2000,cl:‘rgba(39,174,96,0.12)’},{y:5000,cl:‘rgba(46,204,113,0.12)’}].forEach(function(z,i,a){
var y1=lY(z.y),y2=i+1<a.length?lY(a[i+1].y):pt;c.fillStyle=z.cl;c.fillRect(pl,Math.min(y1,y2),cW,Math.abs(y1-y2));
});
[1000,2000,5000].forEach(function(v){var y=lY(v);if(y>pt&&y<H-pb){c.setLineDash([4,4]);c.strokeStyle=‘rgba(0,0,0,0.15)’;c.lineWidth=1;c.beginPath();c.moveTo(pl,y);c.lineTo(W-pr,y);c.stroke();c.setLineDash([]);c.fillStyle=’#aaa’;c.font=‘8px sans-serif’;c.textAlign=‘right’;c.fillText((v/1000)+‘k’,pl-4,y+3);}});
c.strokeStyle=’#c0392b’;c.lineWidth=2.5;c.lineJoin=‘round’;c.beginPath();
vals.forEach(function(v,i){var x=xP(i),y=lY(v);i===0?c.moveTo(x,y):c.lineTo(x,y);});c.stroke();
vals.forEach(function(v,i){var x=xP(i),y=lY(v);c.fillStyle=’#fff’;c.beginPath();c.arc(x,y,5,0,Math.PI*2);c.fill();c.fillStyle=’#c0392b’;c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();c.fillStyle=’#666’;c.font=‘9px sans-serif’;c.textAlign=‘center’;c.fillText(SNS[i],x,H-6);});
}

function rDash(bc){
var all=[];for(var k in bc)all=all.concat(bc[k]);
var act=all.filter(function(p){return p.act;});
var totT=act.reduce(function(a,p){return a+p.turn;},0);
var totS=all.reduce(function(a,p){return a+p.tot;},0);
var top=act.slice().sort(function(a,b){return b.turn-a.turn;})[0];
document.getElementById(‘stats’).innerHTML=[
{l:‘TOVAROV’,v:all.length+’ (akt: ‘+act.length+’)’},
{l:‘OBORACHIVAEM.’,v:Math.round(totT).toLocaleString(‘ru’)+’ r/d’},
{l:‘VIRUCHKA ZA GOD’,v:Math.round(totS).toLocaleString(‘ru’)+’ r’},
{l:‘TOP TOVAR’,v:top?top.n.slice(0,28)+(top.n.length>28?’…’:’’):’-’,sub:top?Math.round(top.turn).toLocaleString(‘ru’)+’ r/d’:’’}
].map(function(s){return ‘<div class="sc"><div class="sl">’+s.l+’</div><div class="sv">’+s.v+’</div>’+(s.sub?’<div class="ss">’+s.sub+’</div>’:’’)+’</div>’;}).join(’’);
var el=document.getElementById(‘tables’);el.innerHTML=’’;
for(var ci=0;ci<CATS.length;ci++){
var cat=CATS[ci],prods=bc[cat];if(!prods||!prods.length)continue;
var sec=document.createElement(‘div’);sec.className=‘cs’;
sec.innerHTML=’<div class="ch"><span>’+cat+’</span><span class="cc">’+prods.length+’</span></div>’
+’<div class="tw"><table><thead><tr>’
+’<th style="text-align:left">Naimenovanie</th><th>Dnei</th><th>Sr.cena</th><th>Oborot</th>’
+’<th>Vesna</th><th>Leto</th><th>Osen</th><th>Zima</th><th>Ostatok</th><th>Zapas</th>’
+’</tr></thead><tbody id="tb'+ci+'"></tbody></table></div>’;
el.appendChild(sec);
var tb=document.getElementById(‘tb’+ci);
for(var pi=0;pi<prods.length;pi++)rRow(tb,prods[pi],ci+’_’+pi);
}
}

function rRow(tb,p,id){
var col=tc(p.turn,p.act),noS=!p.act||!p.turn;
var sc=SNS.map(function(s){var v=p.st[s];return ‘<td style="color:'+col.fg+'">’+(v&&p.act?Math.round(v).toLocaleString(‘ru’)+’ r’:’-’)+’</td>’;}).join(’’);
var tr=document.createElement(‘tr’);tr.className=noS?‘ns’:‘pr’;tr.style.background=col.bg;
tr.innerHTML=’<td style="color:'+col.fg+';opacity:'+(p.act?1:.7)+'">’+(!noS?’<span style="font-size:9px;opacity:.4;margin-right:5px">►</span>’:’’)+p.n+(!p.act?’ <span style="font-size:9px;opacity:.5">[net]</span>’:’’)+’</td>’
+’<td style="color:'+col.fg+'">’+p.dis+’</td>’
+’<td style="color:'+col.fg+'">’+(p.ap?p.ap.toLocaleString(‘ru’)+’ r’:’-’)+’</td>’
+’<td style="color:'+col.fg+';font-weight:700">’+(p.turn&&p.act?Math.round(p.turn).toLocaleString(‘ru’)+’ r’:’-’)+’</td>’
+sc
+’<td style="color:'+col.fg+'">’+(p.stk||’-’)+’</td>’
+’<td style="color:'+col.fg+'">’+(p.sd?Math.round(p.sd)+’ d’:’-’)+’</td>’;
if(!noS)tr.onclick=function(){tDet(tr,p,id);};
tb.appendChild(tr);
}

function tDet(tr,p,id){
var ex=document.getElementById(‘d_’+id);if(ex){ex.remove();var ar=tr.querySelector(‘span’);if(ar)ar.innerHTML=’►’;return;}
var ar=tr.querySelector(‘span’);if(ar)ar.innerHTML=’▼’;
var op=p.sd?Math.round((p.sd/90)*100):0,sp=Math.max(0,100-op),su=sp>0&&p.stk>0?Math.ceil(sp/100*p.stk):0;
var opc=oc(op),spc=sp<=30?’#27ae60’:sp<=70?’#e67e22’:’#c0392b’;
var ord=SNS.map(function(s){var u=p.st[s]&&p.ap?Math.ceil(p.st[s]/p.ap*90):0;return ‘<div class="oi"><span class="os">’+s+’</span><span class="ov" style="color:'+(u?'#1a1714':'#bbb')+'">’+(u||’-’)+’</span></div>’;}).join(’’);
var dt=document.createElement(‘tr’);dt.id=‘d_’+id;dt.className=‘dr’;
dt.innerHTML=’<td colspan="10"><div class="di"><div class="cw"><div class="ctit">OBOROT PO SEZONAM / RUB V DEN / LOG. SHKALA</div><canvas class="cv" id="cv_'+id+'"></canvas></div>’
+’<div class="rp"><div class="pc"><div class="pl">ZATOVARIVANIE (90 = 100%)</div><div class="pb"><div class="pf" style="width:'+Math.min(op,100)+'%;background:'+opc+'"></div><div class="pt">’+op+’%’+(p.sdt?’ ‘+p.sdt:’’)+’</div></div></div>’
+’<div class="pc"><div class="pl">NEDOSTATOK</div><div class="pb"><div class="pf" style="width:'+Math.min(sp,100)+'%;background:'+spc+'"></div><div class="pt">’+(su>0?sp+’% ‘+su+’ ed.’:‘0% norma’)+’</div></div></div>’
+’<div class="pc"><div class="pl">ZAKAZ NA SEZON (90 DNEI)</div><div class="og">’+ord+’</div></div>’
+’<div class="tc2"><span class="tl2">VIRUCHKA ZA GOD</span><span class="tv2">’+p.tot.toLocaleString(‘ru’)+’ r</span></div>’
+’</div></div></td>’;
tr.after(dt);
setTimeout(function(){var cv=document.getElementById(‘cv_’+id);if(cv)drawCh(cv,p);},50);
}

function filterRows(){
var q=document.getElementById(‘si’).value.toLowerCase();
document.querySelectorAll(‘tr.pr,tr.ns’).forEach(function(tr){var t=(tr.querySelector(‘td’)||{}).textContent||’’;tr.style.display=t.toLowerCase().indexOf(q)>=0?’’:‘none’;});
}

async function loadData(){
document.getElementById(‘ldg’).style.display=‘block’;
document.getElementById(‘dash’).style.display=‘none’;
document.getElementById(‘eb’).style.display=‘none’;
document.getElementById(‘rb’).disabled=true;
try{
var t=’&t=’+Date.now();
document.getElementById(‘ltxt’).textContent=‘ZAGRUZKA…’;
var res=await Promise.all([fetch(US+t).then(function(r){if(!r.ok)throw new Error(‘err sales’);return r.text();}),fetch(UI+t).then(function(r){if(!r.ok)throw new Error(‘err intake’);return r.text();}),fetch(UM+t).then(function(r){if(!r.ok)throw new Error(‘err moves’);return r.text();}),fetch(UR+t).then(function(r){if(!r.ok)throw new Error(‘err returns’);return r.text();})]);
var bc=proc(pcsv(res[0]),pcsv(res[1]),pcsv(res[2]),pcsv(res[3]));
rDash(bc);
document.getElementById(‘ldg’).style.display=‘none’;
document.getElementById(‘dash’).style.display=‘block’;
document.getElementById(‘upd’).textContent=’Updated: ’+new Date().toLocaleTimeString(‘ru’);
}catch(e){
document.getElementById(‘ldg’).style.display=‘none’;
var eb=document.getElementById(‘eb’);eb.style.display=‘block’;
eb.innerHTML=‘Error: ‘+e.message+’ <button class="btn" onclick="loadData()">Retry</button>’;
}finally{document.getElementById(‘rb’).disabled=false;}
}
setInterval(loadData,600000);
loadData();
</script>
