function parseCSV(text) {
var lines = text.trim().split(’\n’);
if (lines.length < 2) return [];
var headers = splitLine(lines[0]);
var result = [];
for (var i = 1; i < lines.length; i++) {
var vals = splitLine(lines[i]);
var obj = {};
for (var j = 0; j < headers.length; j++) obj[headers[j].trim()] = (vals[j]||’’).trim();
if (Object.values(obj).some(function(v){return v;})) result.push(obj);
}
return result;
}

function splitLine(line) {
var vals = [], cur = ‘’, inQ = false;
for (var i = 0; i < line.length; i++) {
var ch = line[i];
if (ch === ‘”’) { inQ = !inQ; continue; }
if (ch === ‘,’ && !inQ) { vals.push(cur); cur = ‘’; continue; }
cur += ch;
}
vals.push(cur);
return vals;
}

function parseDate(str) {
if (!str) return null;
str = str.trim();
// DD.MM.YYYY HH:MM
var m = str.match(/^(\d{1,2}).(\d{1,2}).(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
if (m) {
return new Date(+m[3], +m[2]-1, +m[1], m[4]?+m[4]:0, m[5]?+m[5]:0);
}
var d = new Date(str);
return isNaN(d.getTime()) ? null : d;
}

function seasonOf(month) {
for (var s in SEASON_MONTHS) if (SEASON_MONTHS[s].indexOf(month) >= 0) return s;
return null;
}

// Build day-by-day stock balance per article, then count days in stock
function calcDaysInStock(events, fromDate, toDate) {
// events = [{date, qty}] where qty>0 is intake/return, qty<0 is sale/move-out
if (!events.length) return 0;
events.sort(function(a,b){return a.date-b.date;});

var stock = 0;
var daysInStock = 0;
var prevDate = null;
var prevStock = 0;

for (var i = 0; i < events.length; i++) {
var ev = events[i];
var d = ev.date;
if (d < fromDate) { stock += ev.qty; continue; }
if (d > toDate) break;

```
if (prevDate !== null && prevStock > 0) {
  var days = Math.round((d - prevDate) / 86400000);
  daysInStock += days;
}
stock += ev.qty;
prevDate = d;
prevStock = stock;
```

}
// Count remaining days from last event to toDate
if (prevDate !== null && prevStock > 0) {
var days = Math.round((toDate - prevDate) / 86400000);
daysInStock += days;
}
return Math.max(daysInStock, 0);
}

function calcDaysInStockForSeason(events, season) {
// For each year in data, find the season window and count days
if (!events.length) return 0;
events.sort(function(a,b){return a.date-b.date;});
var months = SEASON_MONTHS[season];
var totalDays = 0;

// Get year range from events
var minYear = events[0].date.getFullYear();
var maxYear = events[events.length-1].date.getFullYear();

for (var y = minYear; y <= maxYear; y++) {
// Determine season date range
var startMonth = months[0];
var startYear = y;
// Handle winter crossing year boundary
if (season === ‘Зима’) {
// Dec of y to Feb of y+1
var from = new Date(y, 11, 1);
var to = new Date(y+1, 2, 1); // March 1 next year
totalDays += calcDaysInStock(events, from, to);
} else {
var from = new Date(y, months[0], 1);
var to = new Date(y, months[months.length-1]+1, 1);
totalDays += calcDaysInStock(events, from, to);
}
}
return totalDays;
}

function processData(salesRows, intakeRows, movesRows, returnsRows) {
var now = new Date();
var cutoff365 = new Date(now - 365*86400000);

// Collect all stock events per article: {art -> [{date, qty, type}]}
var events = {};
var artMeta = {}; // art -> {name, group}

function addEvent(art, date, qty, name, group) {
if (!art || !date) return;
if (!events[art]) events[art] = [];
events[art].push({date: date, qty: qty});
if (name && !artMeta[art]) artMeta[art] = {name: name, group: group||’’};
}

// INTAKES: +qty
for (var i = 0; i < intakeRows.length; i++) {
var r = intakeRows[i];
var art = (r[‘Артикул’]||r[‘Код’]||’’).trim();
var name = (r[‘Наименование’]||’’).trim();
if (!art || EXCLUDE.some(function(e){return name.toLowerCase().includes(e);})) continue;
var d = parseDate(r[‘Дата документа’]||r[‘Дата’]||’’);
var qty = parseFloat((r[‘Количество’]||‘0’).replace(’,’,’.’)) || 0;
if (d && qty > 0) addEvent(art, d, qty, name, r[‘Группа’]||’’);
}

// RETURNS: +qty (товар вернулся на склад)
for (var i = 0; i < returnsRows.length; i++) {
var r = returnsRows[i];
var art = (r[‘Артикул’]||r[‘Код’]||’’).trim();
var name = (r[‘Наименование’]||’’).trim();
if (!art || EXCLUDE.some(function(e){return name.toLowerCase().includes(e);})) continue;
var d = parseDate(r[‘Дата документа’]||r[‘Дата’]||’’);
var qty = parseFloat((r[‘Количество’]||‘0’).replace(’,’,’.’)) || 0;
if (d && qty > 0) addEvent(art, d, qty, name, r[‘Группа’]||’’);
}

// SALES: -qty
var salesByArt = {};
for (var i = 0; i < salesRows.length; i++) {
var r = salesRows[i];
var d = parseDate(r[‘Дата документа’]||r[‘Дата’]||’’);
if (!d || d < cutoff365) continue;
var art = (r[‘Артикул’]||r[‘Код’]||’’).trim();
var name = (r[‘Наименование’]||’’).trim();
if (!art || !name || EXCLUDE.some(function(e){return name.toLowerCase().includes(e);})) continue;
var qty = parseFloat((r[‘Количество’]||‘0’).replace(’,’,’.’)) || 0;
var sum = parseFloat((r[‘Сумма’]||‘0’).replace(/\s/g,’’).replace(’,’,’.’)) || 0;
var disc = parseFloat((r[‘Сумма скидки’]||‘0’).replace(/\s/g,’’).replace(’,’,’.’)) || 0;
var effSum = sum - disc;
var season = seasonOf(d.getMonth());
addEvent(art, d, -qty, name, r[‘Группа’]||’’);
if (!salesByArt[art]) salesByArt[art] = {totalSum:0,totalQty:0,seasonSum:{Весна:0,Лето:0,Осень:0,Зима:0},name:name,group:r[‘Группа’]||’’};
salesByArt[art].totalSum += effSum;
salesByArt[art].totalQty += qty;
if (season) salesByArt[art].seasonSum[season] += effSum;
}

// MOVES OUT (перемещения - товар уходит со склада): -qty
for (var i = 0; i < movesRows.length; i++) {
var r = movesRows[i];
var art = (r[‘Артикул’]||r[‘Код’]||’’).trim();
var name = (r[‘Наименование’]||’’).trim();
if (!art || EXCLUDE.some(function(e){return name.toLowerCase().includes(e);})) continue;
var d = parseDate(r[‘Дата документа’]||r[‘Дата’]||’’);
var qty = parseFloat((r[‘Количество’]||‘0’).replace(’,’,’.’)) || 0;
// Moves are transfers — if destination is БРАК, it’s a write-off
// Otherwise treat as neutral (same total stock)
var isBrak = (r[‘Склад назначения’]||r[‘Куда’]||’’).toLowerCase().includes(‘брак’) ||
name.toLowerCase().includes(‘брак’);
if (d && qty > 0 && isBrak) addEvent(art, d, -qty, name, r[‘Группа’]||’’);
}

// BUILD PRODUCTS
var products = [];
for (var art in salesByArt) {
var sd = salesByArt[art];
var evts = events[art] || [];
var meta = artMeta[art] || sd;

```
var avgPrice = sd.totalQty > 0 ? sd.totalSum / sd.totalQty : 0;

// Days in stock over last 365 days
var daysInStock = calcDaysInStock(evts, cutoff365, now);
if (daysInStock < 1) daysInStock = 1;

// Overall turnover
var turnover = sd.totalSum / daysInStock;

// Season turnover: sales in season / days in stock during that season
var seasonTurnover = {};
for (var si = 0; si < SEASONS.length; si++) {
  var s = SEASONS[si];
  var sSum = sd.seasonSum[s] || 0;
  var sDays = calcDaysInStockForSeason(evts, s);
  seasonTurnover[s] = (sSum > 0 && sDays > 0) ? sSum / sDays : 0;
}

products.push({
  art: art,
  name: meta.name,
  group: meta.group,
  category: catFromGroup(meta.group),
  avgPrice: Math.round(avgPrice),
  turnover: Math.round(turnover * 10) / 10,
  daysInStock: daysInStock,
  totalSum: Math.round(sd.totalSum),
  stock: 0, stockDays: 0, selloutDate: '',
  seasonTurnover: seasonTurnover
});
```

}

var byCat = {};
for (var pi = 0; pi < products.length; pi++) {
var p = products[pi];
if (!byCat[p.category]) byCat[p.category] = [];
byCat[p.category].push(p);
}
for (var cat in byCat) {
byCat[cat].sort(function(a,b){return b.turnover - a.turnover;});
}
return byCat;
}

// –– CHART ––
function drawChart(canvas, p) {
var dpr = window.devicePixelRatio || 1;
var W = canvas.offsetWidth || 400, H = 150;
canvas.width = W*dpr; canvas.height = H*dpr;
canvas.style.width = W+‘px’; canvas.style.height = H+‘px’;
var c = canvas.getContext(‘2d’); c.scale(dpr,dpr);
var pad = {t:10,r:10,b:22,l:44};
var cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
var vals = SEASONS.map(function(s){return Math.max(p.seasonTurnover[s]||0,1);});
var maxV = Math.max.apply(null,vals.concat([200]));
var logMax = Math.log10(maxV);
var logY = function(v){return pad.t + cH - (Math.log10(Math.max(v,1))/logMax)*cH;};
var xPos = function(i){return pad.l + (i/(SEASONS.length-1))*cW;};
// Zones
var zones=[{y:1,cl:‘rgba(192,57,43,0.12)’},{y:1000,cl:‘rgba(231,126,34,0.12)’},{y:2000,cl:‘rgba(39,174,96,0.12)’},{y:5000,cl:‘rgba(46,204,113,0.12)’}];
zones.forEach(function(z,i){
var y1=logY(z.y), y2=i+1<zones.length?logY(zones[i+1].y):pad.t;
c.fillStyle=z.cl; c.fillRect(pad.l,Math.min(y1,y2),cW,Math.abs(y1-y2));
});
[1000,2000,5000].forEach(function(v){
var y=logY(v);
if(y>pad.t&&y<H-pad.b){c.setLineDash([4,4]);c.strokeStyle=‘rgba(0,0,0,0.15)’;c.lineWidth=1;c.beginPath();c.moveTo(pad.l,y);c.lineTo(W-pad.r,y);c.stroke();c.setLineDash([]);c.fillStyle=’#aaa’;c.font=‘8px DM Sans’;c.textAlign=‘right’;c.fillText((v/1000)+‘k’,pad.l-4,y+3);}
});
c.strokeStyle=’#c0392b’;c.lineWidth=2.5;c.lineJoin=‘round’;c.beginPath();
vals.forEach(function(v,i){var x=xPos(i),y=logY(v);i===0?c.moveTo(x,y):c.lineTo(x,y);});
c.stroke();
vals.forEach(function(v,i){
var x=xPos(i),y=logY(v);
c.fillStyle=’#fff’;c.beginPath();c.arc(x,y,5,0,Math.PI*2);c.fill();
c.fillStyle=’#c0392b’;c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();
c.fillStyle=’#666’;c.font=‘9px sans-serif’;c.textAlign=‘center’;c.fillText(SEASONS[i],x,H-6);
});
}

// –– RENDER ––
function renderDashboard(byCat) {
var all = [];
for (var k in byCat) all = all.concat(byCat[k]);
var totalT = all.reduce(function(a,p){return a+p.turnover;},0);
var totalS = all.reduce(function(a,p){return a+p.totalSum;},0);
var top = all.slice().sort(function(a,b){return b.turnover-a.turnover;})[0];

document.getElementById(‘stats’).innerHTML = [
{l:‘ТОВАРОВ’,v:all.length},
{l:‘ОБОРАЧИВАЕМОСТЬ’,v:Math.round(totalT).toLocaleString(‘ru’)+’ руб/день’},
{l:‘ВЫРУЧКА ЗА ГОД’,v:Math.round(totalS).toLocaleString(‘ru’)+’ руб’},
{l:‘ТОП ТОВАР’,v:top?top.name.slice(0,28)+(top.name.length>28?’…’:’’):’—’,sub:top?Math.round(top.turnover).toLocaleString(‘ru’)+’ руб/день’:’’}
].map(function(s){return ‘<div class="stat-card"><div class="stat-label">’+s.l+’</div><div class="stat-value">’+s.v+’</div>’+(s.sub?’<div class="stat-sub">’+s.sub+’</div>’:’’)+’</div>’;}).join(’’);

var tablesEl = document.getElementById(‘tables’);
tablesEl.innerHTML = ‘’;
for (var ci = 0; ci < CATEGORIES.length; ci++) {
var cat = CATEGORIES[ci];
var prods = byCat[cat];
if (!prods || !prods.length) continue;
var sec = document.createElement(‘div’);
sec.className = ‘cat-section’;
sec.innerHTML = ‘<div class="cat-header"><span>’+cat.toUpperCase()+’</span><span class="cat-count">’+prods.length+’ ПОЗ.</span></div>’
+’<div class="table-wrap"><table><thead><tr>’
+’<th style="text-align:left">Наименование</th><th>Дней в наличии</th><th>Ср. цена</th><th>Оборачиваемость</th>’
+’<th>Весна</th><th>Лето</th><th>Осень</th><th>Зима</th><th>Остаток</th><th>Запас дней</th>’
+’</tr></thead><tbody id="tb_'+ci+'"></tbody></table></div>’;
tablesEl.appendChild(sec);
var tbody = document.getElementById(‘tb_’+ci);
for (var pi = 0; pi < prods.length; pi++) renderRow(tbody, prods[pi], pi, ci);
}
}

function renderRow(tbody, p, pi, ci) {
var tc = tColor(p.turnover);
var noS = !p.turnover;
var id = ‘p_’+ci+’_’+pi;
var sCells = SEASONS.map(function(s){
var v = p.seasonTurnover[s];
return ‘<td style="color:'+tc.fg+'">’+(v?Math.round(v).toLocaleString(‘ru’)+’ р’:’—’)+’</td>’;
}).join(’’);
var tr = document.createElement(‘tr’);
tr.className = noS ? ‘ns’ : ‘pr’;
tr.style.background = tc.bg;
tr.innerHTML = ‘<td style="color:'+tc.fg+'">’+((!noS)?’<span style="font-size:9px;opacity:0.5;margin-right:5px">►</span>’:’’)+p.name+’</td>’
+’<td style="color:'+tc.fg+'">’+p.daysInStock+’</td>’
+’<td style="color:'+tc.fg+'">’+(p.avgPrice?p.avgPrice.toLocaleString(‘ru’)+’ р’:’—’)+’</td>’
+’<td style="color:'+tc.fg+';font-weight:700">’+(p.turnover?Math.round(p.turnover).toLocaleString(‘ru’)+’ р’:’—’)+’</td>’
+sCells
+’<td style="color:'+tc.fg+'">’+(p.stock||’—’)+’</td>’
+’<td style="color:'+tc.fg+'">’+(p.stockDays?Math.round(p.stockDays)+’ дн.’:’—’)+’</td>’;
if (!noS) tr.onclick = function(){toggleDetail(tr, p, id);};
tbody.appendChild(tr);
}

function toggleDetail(tr, p, id) {
var ex = document.getElementById(‘d_’+id);
var arr = tr.querySelector(‘span’);
if (ex) { ex.remove(); if(arr) arr.innerHTML=’►’; return; }
if (arr) arr.innerHTML=’▼’;
var opct = p.stockDays ? Math.round((p.stockDays/90)*100) : 0;
var spct = Math.max(0, 100-opct);
var sUnits = spct>0&&p.stock>0 ? Math.ceil(spct/100*p.stock) : 0;
var oc = ovColor(opct);
var sc = spct<=30?’#27ae60’:spct<=70?’#e67e22’:’#c0392b’;
var orderHTML = SEASONS.map(function(s){
var u = p.seasonTurnover[s]&&p.avgPrice ? Math.ceil(p.seasonTurnover[s]/p.avgPrice*90) : 0;
return ‘<div class="oi"><span class="os">’+s+’</span><span class="ov" style="color:'+(u>0?'#1a1714':'#bbb')+'">’+( u||’—’)+’</span></div>’;
}).join(’’);
var detTr = document.createElement(‘tr’);
detTr.id = ‘d_’+id;
detTr.className = ‘detail-row’;
detTr.innerHTML = ‘<td colspan="10"><div class="detail-inner">’
+’<div class="chart-wrap"><div class="chart-title">ДИНАМИКА ОБОРАЧИВАЕМОСТИ / РУБ В ДЕНЬ / ЛОГ. ШКАЛА</div>’
+’<canvas class="sc" id="cv_'+id+'"></canvas></div>’
+’<div class="rp">’
+’<div class="pc"><div class="pl">ЗАТОВАРИВАНИЕ (90 ДНЕЙ = 100%)</div><div class="pb"><div class="pf" style="width:'+Math.min(opct,100)+'%;background:'+oc+'"></div><div class="pt">’+opct+’%’+(p.selloutDate?’ · ‘+p.selloutDate:’’)+’</div></div></div>’
+’<div class="pc"><div class="pl">НЕДОСТАТОК</div><div class="pb"><div class="pf" style="width:'+Math.min(spct,100)+'%;background:'+sc+'"></div><div class="pt">’+(sUnits>0?spct+’% · ‘+sUnits+’ ед.’:‘0% норма’)+’</div></div></div>’
+’<div class="pc"><div class="pl">ЗАКАЗ НА СЕЗОН (90 ДНЕЙ)</div><div class="og">’+orderHTML+’</div></div>’
+’<div class="tc"><span class="tl">ВЫРУЧКА ЗА ГОД</span><span class="tv">’+p.totalSum.toLocaleString(‘ru’)+’ руб</span></div>’
+’</div></div></td>’;
tr.after(detTr);
setTimeout(function(){var cv=document.getElementById(‘cv_’+id);if(cv)drawChart(cv,p);},50);
}

function filterProducts() {
var q = document.getElementById(‘srch’).value.toLowerCase();
document.querySelectorAll(‘tr.pr,tr.ns’).forEach(function(tr){
var name = (tr.querySelector(‘td’)||{}).textContent||’’;
tr.style.display = name.toLowerCase().includes(q)?’’:‘none’;
});
}

async function loadData() {
document.getElementById(‘loading’).style.display=‘block’;
document.getElementById(‘dash’).style.display=‘none’;
document.getElementById(‘errbox’).style.display=‘none’;
document.getElementById(‘rbtn’).disabled=true;
try {
document.getElementById(‘ltxt’).textContent=‘ЗАГРУЖАЕМ ДАННЫЕ…’;
var t = ‘&t=’+Date.now();
var [r1,r2,r3,r4] = await Promise.all([
fetch(CSV_SALES+t).then(function(r){if(!r.ok)throw new Error(’Ошибка продаж ’+r.status);return r.text();}),
fetch(CSV_INTAKE+t).then(function(r){if(!r.ok)throw new Error(’Ошибка приёмок ’+r.status);return r.text();}),
fetch(CSV_MOVES+t).then(function(r){if(!r.ok)throw new Error(’Ошибка перемещений ’+r.status);return r.text();}),
fetch(CSV_RETURNS+t).then(function(r){if(!r.ok)throw new Error(’Ошибка возвратов ’+r.status);return r.text();})
]);
document.getElementById(‘ltxt’).textContent=‘ОБРАБАТЫВАЕМ…’;
var byCat = processData(parseCSV(r1),parseCSV(r2),parseCSV(r3),parseCSV(r4));
renderDashboard(byCat);
document.getElementById(‘loading’).style.display=‘none’;
document.getElementById(‘dash’).style.display=‘block’;
document.getElementById(‘upd’).textContent=’Обновлено: ’+new Date().toLocaleTimeString(‘ru’);
} catch(e) {
document.getElementById(‘loading’).style.display=‘none’;
var eb=document.getElementById(‘errbox’);
eb.style.display=‘block’;
eb.innerHTML=‘Ошибка: ‘+e.message+’ <button class="btn" onclick="loadData()">Повторить</button>’;
} finally {
document.getElementById(‘rbtn’).disabled=false;
}
}

setInterval(loadData, 10*60*1000);
loadData();
</script>
