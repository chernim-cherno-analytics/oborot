<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chernim Cherno · Перемещения</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; background: #f3e9e0; color:#1f1f1f; }
    .gradient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #f3e9e0; }
    .gradient-bg::before, .gradient-bg::after, .b1, .b2, .b3 {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.9; }
    .gradient-bg::before { content: ''; width: 70vw; height: 70vw;
      background: radial-gradient(circle, #efe5db, transparent 70%);
      top: -20%; left: -10%; animation: blob1 11s ease-in-out infinite alternate; }
    .gradient-bg::after { content: ''; width: 60vw; height: 60vw;
      background: radial-gradient(circle, #e2d8cf, transparent 70%);
      bottom: -15%; right: -10%; animation: blob2 14s ease-in-out infinite alternate; }
    .b1 { width: 55vw; height: 55vw; background: radial-gradient(circle, #d3c9c2, transparent 70%);
      top: 30%; left: 30%; animation: blob3 9s ease-in-out infinite alternate; }
    .b2 { width: 45vw; height: 45vw; background: radial-gradient(circle, #c1b8b3, transparent 70%);
      top: -10%; right: 10%; animation: blob4 13s ease-in-out infinite alternate; }
    .b3 { width: 50vw; height: 50vw; background: radial-gradient(circle, #aba3a0, transparent 70%);
      bottom: 10%; left: 20%; animation: blob5 16s ease-in-out infinite alternate; }
    .vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(171,163,160,0.35) 100%); }
    .grain { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .grain::before { content: ''; position: absolute; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
      background-size: 200px 200px; opacity: 0.12; mix-blend-mode: overlay;
      animation: grain-shift 0.15s steps(1) infinite; }
    @keyframes grain-shift {
      0%{transform:translate(0,0)} 10%{transform:translate(-3%,-4%)} 20%{transform:translate(4%,2%)}
      30%{transform:translate(-2%,5%)} 40%{transform:translate(5%,-3%)} 50%{transform:translate(-4%,4%)}
      60%{transform:translate(3%,-2%)} 70%{transform:translate(-5%,3%)} 80%{transform:translate(2%,-5%)}
      90%{transform:translate(-3%,2%)} 100%{transform:translate(4%,-4%)} }
    @keyframes blob1 { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(8vw,5vh) scale(1.1)} 66%{transform:translate(-5vw,10vh) scale(0.95)} 100%{transform:translate(10vw,-8vh) scale(1.05)} }
    @keyframes blob2 { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(-10vw,-6vh) scale(1.08)} 66%{transform:translate(6vw,-12vh) scale(1.12)} 100%{transform:translate(-8vw,5vh) scale(0.92)} }
    @keyframes blob3 { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(-12vw,8vh) scale(1.15)} 100%{transform:translate(8vw,-10vh) scale(0.9)} }
    @keyframes blob4 { 0%{transform:translate(0,0) scale(0.9)} 50%{transform:translate(10vw,12vh) scale(1.1)} 100%{transform:translate(-6vw,6vh) scale(1)} }
    @keyframes blob5 { 0%{transform:translate(0,0) scale(1.1)} 50%{transform:translate(14vw,-8vh) scale(0.9)} 100%{transform:translate(-10vw,-12vh) scale(1.05)} }
    .header { position: sticky; top: 0; z-index: 200; padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; }
    .logo { text-decoration: none; font-size: 15px; font-weight: 400; letter-spacing: 0.12em; color: #1f1f1f; }
    .nav { display: flex; gap: 20px }
    .nav a { font-size: 13px; font-weight: 400; letter-spacing: 0.05em;
      color: rgba(31,31,31,0.45); text-decoration: none; transition: color .2s; }
    .nav a:hover { color: #434446 }
    .nav a.active { color: #1f1f1f; font-weight: 500; }
    .main { padding: 20px 28px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 3; }
    .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px }
    .dinp { padding:7px 12px; border-radius:9px; font-size:13px;
      border:1px solid rgba(31,31,31,0.2); background:#fff; outline:none }
    .search { flex:0 0 280px; padding:7px 14px; border-radius:10px; font-size:13px;
      border:1px solid rgba(31,31,31,0.16); background:rgba(255,255,255,0.7); outline:none }
    .hint { font-size:11px; color:rgba(31,31,31,0.45) }
    .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px }
    .card { background:rgba(255,255,255,0.6); backdrop-filter:blur(10px);
      border:1px solid rgba(31,31,31,0.08); border-radius:12px; padding:13px 17px }
    .card .l { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase;
      color:rgba(31,31,31,0.5); margin-bottom:5px }
    .card .v { font-size:22px; font-weight:700 }
    .cat-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px }
    .cat-btn { font-size:12px; font-weight:500; padding:5px 14px; border-radius:20px;
      border:1px solid rgba(31,31,31,0.09); background:rgba(255,255,255,0.55);
      color:#434446; cursor:pointer; transition:all .15s }
    .cat-btn:hover { background:rgba(31,31,31,0.09) }
    .cat-btn.active { background:rgba(31,31,31,0.16); color:#1f1f1f; border-color:rgba(31,31,31,0.45) }
    .cat-btn .cnt { font-size:10px; opacity:.6; margin-left:3px }
    .table-outer { background:rgba(255,255,255,0.55); backdrop-filter:blur(16px);
      border:1px solid rgba(31,31,31,0.09); border-radius:12px; overflow:auto;
      max-height:calc(100vh - 320px) }
    table { width:100%; border-collapse:collapse; font-size:12.5px }
    thead th { background:rgba(255,255,255,0.88); padding:10px; text-align:center;
      font-size:10px; font-weight:500; color:rgba(31,31,31,0.62); letter-spacing:.06em;
      text-transform:uppercase; position:sticky; top:0; z-index:10;
      border-bottom:1px solid rgba(31,31,31,0.09) }
    thead th:first-child { text-align:left; padding-left:14px }
    tbody td { padding:7px 10px; border-bottom:1px solid rgba(31,31,31,0.06);
      text-align:center; vertical-align:middle }
    tbody td:first-child { text-align:left; padding-left:14px; font-weight:500 }
    tr.pr { cursor:pointer }
    tr.pr:hover td { background:rgba(255,255,255,0.6) }
    tr.sr td { background:rgba(255,255,255,0.7); font-size:11.5px; color:#434446; padding:5px 10px }
    tr.sr td:first-child { padding-left:36px; font-style:italic; font-weight:400 }
    .ei { display:inline-block; width:14px; font-size:9px; color:rgba(31,31,31,0.4);
      margin-right:6px; transition:transform .15s }
    tr.pr.open .ei { transform:rotate(90deg) }
    .qty { font-weight:700; font-size:13px }
    .qty.zero { opacity:.3; font-weight:400 }
    .loading { text-align:center; padding:60px; color:rgba(31,31,31,0.45); font-size:13px }

    /* ── Рекомендации переброса ── */
    .reco-wrap { background:rgba(255,255,255,0.55); backdrop-filter:blur(16px);
      border:1px solid rgba(31,31,31,0.09); border-radius:12px; margin-bottom:16px; overflow:hidden }
    .reco-head { display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; user-select:none }
    .reco-arrow { font-size:10px; color:rgba(31,31,31,0.45) }
    .reco-title { font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase }
    .reco-sub { font-size:11px; color:rgba(31,31,31,0.5) }
    .reco-btn { margin-left:auto; font-size:12px; font-weight:600; padding:7px 16px; border-radius:20px;
      border:1px solid rgba(31,31,31,0.25); background:#1f1f1f; color:#f3e9e0; cursor:pointer }
    .reco-btn:hover { background:#3a3a3a }
    .reco-body { max-height:420px; overflow:auto; border-top:1px solid rgba(31,31,31,0.08) }
    tr.rst td { background:rgba(31,31,31,0.08); font-weight:700; font-size:10.5px; letter-spacing:.06em;
      text-transform:uppercase; text-align:left; padding:7px 14px; color:rgba(31,31,31,0.7) }
    .rqty { width:52px; padding:4px; text-align:center; font-size:12.5px; font-weight:700;
      border:1px solid rgba(31,31,31,0.2); border-radius:7px; background:#fff; outline:none }
    .rqty::-webkit-outer-spin-button, .rqty::-webkit-inner-spin-button { -webkit-appearance:none; margin:0 }
    .rchk { width:15px; height:15px; accent-color:#1f1f1f; cursor:pointer }
    .lastd { font-size:11px; color:rgba(31,31,31,0.55) }
    tr.roff td { opacity:.35 }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="gradient-bg"><div class="b1"></div><div class="b2"></div><div class="b3"></div></div>
<div class="vignette"></div><div class="grain"></div>

<div class="header">
  <a class="logo" href="/analytics">Chernim&nbsp;Cherno</a>
  <nav class="nav">
    <a href="/analytics">Остатки</a>
    <a href="/turnover">Оборачиваемость</a>
    <a href="/order">Заказ</a>
    <a href="/sizes">Размеры</a>
    <a href="/forecast">Прогноз</a>
    <a href="/revenue">Оборот</a>
    <a href="/transfers" class="active">Перемещения</a>
    <a href="/money">Деньги</a>
    <a href="/paris">Париж</a>
    <a href="/yandex">Яндекс</a>
  </nav>
</div>

<div class="main">
  <div class="toolbar">
    <span style="font-size:13px;font-weight:600">Остатки по складам на дату:</span>
    <input type="date" class="dinp" id="datePick">
    <span class="hint">данные тянутся напрямую из МойСклада — можно выбрать любой день</span>
    <input class="search" id="search" placeholder="Поиск по названию..." style="margin-left:auto">
  </div>

  <div class="reco-wrap" id="reco-wrap" style="display:none">
    <div class="reco-head" onclick="toggleReco(event)">
      <span class="reco-arrow" id="reco-arrow">▾</span>
      <span class="reco-title">Рекомендации переброса</span>
      <span class="reco-sub" id="reco-sub">считаю…</span>
      <button class="reco-btn" onclick="event.stopPropagation();downloadMoves()">⬇ Скачать перемещение</button>
    </div>
    <div class="reco-body" id="reco-body"></div>
  </div>

  <div class="cards" id="cards"></div>
  <div class="cat-bar" id="cat-bar"></div>

  <div class="table-outer">
    <table>
      <thead id="thead"></thead>
      <tbody id="tb"><tr><td colspan="5" class="loading">Выбери дату — загружу остатки</td></tr></tbody>
    </table>
  </div>
</div>

<script>
function mw(name,q){ if(!q) return true; const nl=name.toLowerCase(); return q.split(/\s+/).every(w=>nl.includes(w)); }
const CATEGORIES = {
  "Верхняя одежда": ["бомбер","куртка","тренч","пальто","ветровка","олимпийка","комбинезон","фрак","меховой пиджак"],
  "Костюмы": ["пиджак","жилет-галстук","корсетный жилет"],
  "Брюки": ["брюки","спортивные брюки"],
  "Рубашки": ["рубашка","рубашка-оригами"],
  "Свитера": ["свитер"],
  "Худи и свитшоты": ["худи","свитшот"],
  "Шорты": ["шорты"],
  "Майки": ["майка","топ","лонгслив","кроп кольчуга","манишка кольчуга","майка кольчуга","укороченная"],
  "Футболки": ["футболка"],
  "Джинсы": ["джинсы"],
  "Сумки": ["сумка","клатч"],
  "Аксессуары": ["ремень","шарф","шапка","меховой ворот","воротник","очки"],
  "Украшения": ["браслет","кольцо","подвеска","кафф","цепь","цепочка","сет из","серьга","серёжка","пирсинг"],
  "Нижнее белье": ["боксер","боксёр","брифы","комплект нижнег","трусы","носки"],
  "Прочее": []
};
const CAT_ORDER = ["Верхняя одежда","Костюмы","Брюки","Джинсы","Рубашки","Свитера","Худи и свитшоты","Шорты","Майки","Футболки","Сумки","Аксессуары","Украшения","Нижнее белье","Прочее"];
const NON_MERCH = ["сертификат","кошелек","sample","сэмпл","упаковоч","пакет","коробк","вешалк","бирк","кофр","наклейк","кейс для","чехол для","нитк","бумага тишью"];
function getCat(n){
  const nl=n.toLowerCase();
  if(NON_MERCH.some(k=>nl.includes(k))) return null;
  for(const [c,kws] of Object.entries(CATEGORIES)){
    if(c==="Прочее") continue;
    if(kws.some(k=>nl.includes(k))) return c;
  }
  return "Прочее";
}
function stripSize(n){ return n.replace(/\s*\([^)]*\)\s*$/,"").trim(); }
function shortStore(s){
  const sl=s.toLowerCase();
  if(sl.includes("мясницк")) return "Мясницкая";
  if(sl.includes("горохов")) return "Гороховая";
  if(sl.includes("интернет")) return "Интернет-магазин";
  return s;
}
function fmt(n){ return Math.round(n||0).toLocaleString("ru-RU"); }

let DATA=null, currentCat="Верхняя одежда", GROUPS={};

async function loadDate(date){
  document.getElementById("tb").innerHTML='<tr><td colspan="5" class="loading">Спрашиваю МойСклад про '+new Date(date).toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"})+'... (5–10 сек)</td></tr>';
  try{
    const r=await fetch("/api/stock-on-date?date="+date);
    if(!r.ok) throw new Error("HTTP "+r.status);
    DATA=await r.json();
  }catch(e){
    document.getElementById("tb").innerHTML='<tr><td colspan="5" class="loading">Ошибка: '+e.message+'</td></tr>';
    return;
  }
  // группируем варианты по базовому имени
  GROUPS={};
  const ns=DATA.stores.length;
  for(const [name,per] of Object.entries(DATA.skus)){
    const base=stripSize(name);
    const cat=getCat(base);
    if(!cat) continue;
    const g=GROUPS[base]||(GROUPS[base]={cat,per:new Array(ns).fill(0),total:0,sizes:[]});
    for(let i=0;i<ns;i++) g.per[i]+=per[i];
    g.total+=per.reduce((a,b)=>a+b,0);
    g.sizes.push({name,per});
  }
  renderCards(); buildTabs(); renderHead(); render();
}

function renderCards(){
  const ns=DATA.stores.length;
  const perStore=new Array(ns).fill(0);
  let tot=0;
  for(const g of Object.values(GROUPS)){
    for(let i=0;i<ns;i++) perStore[i]+=g.per[i];
    tot+=g.total;
  }
  let html=DATA.stores.map((s,i)=>
    `<div class="card"><div class="l">${shortStore(s)}</div><div class="v">${fmt(perStore[i])} шт</div></div>`).join("");
  html+=`<div class="card" style="background:rgba(76,187,23,0.2)"><div class="l">Всего · 3 склада</div><div class="v">${fmt(tot)} шт</div></div>`;
  document.getElementById("cards").innerHTML=html;
}

function buildTabs(){
  const cnt={};
  for(const g of Object.values(GROUPS)) if(g.total>0) cnt[g.cat]=(cnt[g.cat]||0)+1;
  if(!cnt[currentCat]){ const f=CAT_ORDER.find(c=>cnt[c]); if(f) currentCat=f; }
  document.getElementById("cat-bar").innerHTML=CAT_ORDER.filter(c=>cnt[c]).map(c=>
    `<button class="cat-btn ${c===currentCat?"active":""}" onclick="selCat('${c}')">${c}<span class="cnt">${cnt[c]}</span></button>`).join("");
}
function selCat(c){ currentCat=c; buildTabs(); render(); }

function renderHead(){
  let cols='<th>Название</th>';
  for(const s of DATA.stores) cols+='<th>'+shortStore(s)+'</th>';
  cols+='<th>Всего</th>';
  document.getElementById("thead").innerHTML='<tr>'+cols+'</tr>';
}

function render(){
  const q=(document.getElementById("search").value||"").toLowerCase();
  const tb=document.getElementById("tb");
  tb.innerHTML="";
  const items=Object.entries(GROUPS)
    .filter(([b,g])=>g.total>0&&(q?mw(b,q):g.cat===currentCat))
    .sort((a,b)=>b[1].total-a[1].total);
  if(!items.length){ tb.innerHTML='<tr><td colspan="5" class="loading">Пусто</td></tr>'; return; }
  const frag=document.createDocumentFragment();
  for(const [base,g] of items){
    const tr=document.createElement("tr");
    tr.className="pr";
    let cells=`<td><span class="ei">▶</span>${base}</td>`;
    for(const v of g.per) cells+=`<td><span class="qty ${v?"":"zero"}">${fmt(v)}</span></td>`;
    cells+=`<td><span class="qty">${fmt(g.total)}</span></td>`;
    tr.innerHTML=cells;
    tr.addEventListener("click",()=>{
      if(tr.classList.contains("open")){
        tr.classList.remove("open");
        let n=tr.nextSibling;
        while(n&&n.classList&&n.classList.contains("sr")){const x=n;n=n.nextSibling;x.remove();}
        return;
      }
      tr.classList.add("open");
      let anchor=tr;
      const sorted=[...g.sizes].sort((a,b)=>a.name.localeCompare(b.name));
      for(const sz of sorted){
        const r=document.createElement("tr");
        r.className="sr";
        const m=sz.name.match(/\(([^)]+)\)\s*$/);
        let c=`<td>↳ ${m?m[1]:sz.name}</td>`;
        for(const v of sz.per) c+=`<td><span class="qty ${v?"":"zero"}" style="font-size:11px">${fmt(v)}</span></td>`;
        c+=`<td><span class="qty" style="font-size:11px">${fmt(sz.per.reduce((a,b)=>a+b,0))}</span></td>`;
        r.innerHTML=c;
        anchor.after(r); anchor=r;
      }
    });
    frag.appendChild(tr);
  }
  tb.appendChild(frag);
}

// ══════ Рекомендации переброса ══════
// Правило: размер продавался на складе за последние RECENT_DAYS дней, сейчас там 0,
// а на другом складе остаток ≥2 (донору оставляем минимум 1 шт).
const RECENT_DAYS=60;
let RECS=[], RSTORES=[], recoOpen=true;

async function loadReco(){
  let bys, hidden=new Set();
  try{ bys=await (await fetch("/api/stocks-bystore")).json(); }catch(e){ return; }
  try{ hidden=new Set(await (await fetch("/api/hidden")).json()); }catch(e){}
  const stores=bys.stores||[];
  RSTORES=stores.map(shortStore);
  const now=Date.now();
  RECS=[];
  for(const [base,rec] of Object.entries(bys.skus||{})){
    if(hidden.has(base)) continue;
    if(!getCat(base)) continue;
    for(const [size,srec] of Object.entries(rec.sizes||{})){
      const per=srec.per||[], last=srec.last||[];
      for(let t=0;t<stores.length;t++){
        if((per[t]||0)>0) continue;                       // на складе уже есть
        if(!last[t]) continue;                            // там никогда не продавался
        const days=(now-new Date(last[t]).getTime())/86400000;
        if(days>RECENT_DAYS) continue;                    // спрос неактуален
        let d=-1;                                         // донор: макс. остаток, ≥2
        for(let s=0;s<stores.length;s++)
          if(s!==t&&(per[s]||0)>=2&&(d<0||per[s]>per[d])) d=s;
        if(d<0) continue;
        RECS.push({base,size,from:d,to:t,qty:per[d]>=4?2:1,avail:per[d],
          last:last[t],days:Math.round(days),on:true});
      }
    }
  }
  RECS.sort((a,b)=>a.to-b.to||a.days-b.days||a.base.localeCompare(b.base,"ru"));
  renderReco();
}

function renderReco(){
  const wrap=document.getElementById("reco-wrap");
  if(!RECS.length){ wrap.style.display="none"; return; }
  wrap.style.display="";
  document.getElementById("reco-sub").textContent=
    RECS.length+" строк · размер продавался на складе за "+RECENT_DAYS+" дн, сейчас там 0, у другого склада есть запас";
  let html='<table><thead><tr><th style="width:36px"></th><th style="text-align:left;padding-left:14px">Позиция</th><th>Размер</th><th>Откуда</th><th>Куда</th><th>Шт</th><th>У донора</th><th>Последняя продажа там</th></tr></thead><tbody>';
  let lastTo=-1;
  RECS.forEach((r,i)=>{
    if(r.to!==lastTo){ lastTo=r.to; html+='<tr class="rst"><td colspan="8">→ Довезти: '+RSTORES[r.to]+'</td></tr>'; }
    html+='<tr class="'+(r.on?'':'roff')+'" data-row="'+i+'">'+
      '<td><input type="checkbox" class="rchk" data-i="'+i+'"'+(r.on?' checked':'')+'></td>'+
      '<td style="text-align:left;padding-left:14px;font-weight:500">'+r.base+'</td>'+
      '<td>'+(r.size||'One Size')+'</td>'+
      '<td>'+RSTORES[r.from]+'</td><td><b>'+RSTORES[r.to]+'</b></td>'+
      '<td><input type="number" min="1" max="'+Math.max(1,r.avail-1)+'" class="rqty" data-i="'+i+'" value="'+r.qty+'"></td>'+
      '<td>'+r.avail+' шт</td>'+
      '<td class="lastd">'+new Date(r.last).toLocaleDateString("ru-RU")+' · '+r.days+' дн назад</td></tr>';
  });
  html+='</tbody></table>';
  document.getElementById("reco-body").innerHTML=html;
}

function toggleReco(e){
  if(e.target.closest(".reco-btn")||e.target.tagName==="INPUT") return;
  recoOpen=!recoOpen;
  document.getElementById("reco-body").style.display=recoOpen?"":"none";
  document.getElementById("reco-arrow").textContent=recoOpen?"▾":"▸";
}

document.addEventListener("change",e=>{
  const t=e.target;
  if(t.classList&&t.classList.contains("rchk")){
    const r=RECS[+t.dataset.i];
    r.on=t.checked;
    const row=document.querySelector('tr[data-row="'+t.dataset.i+'"]');
    if(row) row.className=r.on?'':'roff';
  }
  if(t.classList&&t.classList.contains("rqty")){
    const r=RECS[+t.dataset.i];
    let v=parseInt(t.value,10);
    if(!isFinite(v)||v<1) v=1;
    if(v>Math.max(1,r.avail-1)) v=Math.max(1,r.avail-1);
    t.value=v; r.qty=v;
  }
});

function downloadMoves(){
  const sel=RECS.filter(r=>r.on);
  if(!sel.length){ alert("Не выбрано ни одной строки"); return; }
  const pairs={};
  for(const r of sel){ const k=r.from+">"+r.to; (pairs[k]=pairs[k]||[]).push(r); }
  const today=new Date(), ds=today.toLocaleDateString("ru-RU");
  let body='', grand=0;
  for(const k of Object.keys(pairs)){
    const [f,t]=k.split(">").map(Number);
    const rows=pairs[k];
    body+='<h2>'+RSTORES[f]+' → '+RSTORES[t]+'</h2><table><thead><tr><th>№</th><th class="l">Позиция</th><th>Размер</th><th>Кол-во</th></tr></thead><tbody>';
    let i=0,sub=0;
    for(const r of rows){
      i++; sub+=r.qty; grand+=r.qty;
      body+='<tr><td>'+i+'</td><td class="l">'+r.base+'</td><td>'+(r.size||'One Size')+'</td><td><b>'+r.qty+'</b></td></tr>';
    }
    body+='</tbody></table><div class="tot">Итого '+RSTORES[f]+' → '+RSTORES[t]+': <b>'+sub+' шт</b> · '+rows.length+' строк</div>';
  }
  body+='<div class="tot grand">Всего к перемещению: <b>'+grand+' шт</b></div>';
  const doc='<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Перемещение '+ds+'</title><style>'+
    'body{font-family:Helvetica,Arial,sans-serif;color:#1f1f1f;padding:32px;max-width:800px;margin:0 auto}'+
    'h1{font-size:20px;margin-bottom:2px}.sub{color:#888;font-size:12px;margin-bottom:20px}'+
    'h2{font-size:15px;text-transform:uppercase;letter-spacing:.06em;margin:22px 0 6px;border-bottom:2px solid #1f1f1f;padding-bottom:4px}'+
    'table{width:100%;border-collapse:collapse;font-size:13px}'+
    'th{background:#1f1f1f;color:#fff;text-align:left;padding:7px 10px;font-size:11px}'+
    'td{padding:6px 10px;border-bottom:1px solid #e3e3e3;vertical-align:top}'+
    'tr:nth-child(even) td{background:#faf7f3}'+
    '.tot{margin:8px 0 16px;font-size:13px;background:#f0ebe4;padding:9px 13px;border-radius:8px}'+
    '.tot.grand{background:#1f1f1f;color:#f3e9e0;font-size:14px}'+
    '@media print{body{padding:0}}</style></head><body>'+
    '<h1>Перемещение между складами · Chernim Cherno</h1>'+
    '<div class="sub">сформировано '+ds+' · рекомендации по продажам за последние '+RECENT_DAYS+' дней</div>'+
    body+'</body></html>';
  savePdf(doc, "перемещение-"+today.toISOString().slice(0,10)+".pdf");
}

// печатная версия → PDF (html2pdf с CDN; если недоступен — HTML)
async function savePdf(doc, filename){
  if(typeof html2pdf==="undefined"){
    const blob=new Blob([doc],{type:"text/html;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename.replace(/\.pdf$/i,".html");
    document.body.appendChild(a); a.click(); a.remove();
    return;
  }
  const ifr=document.createElement("iframe");
  ifr.style.cssText="position:fixed;left:-10000px;top:0;width:920px;height:1200px;border:0";
  document.body.appendChild(ifr);
  ifr.srcdoc=doc;
  await new Promise(r=>{ ifr.onload=r; });
  await new Promise(r=>setTimeout(r,150));
  const dd=ifr.contentDocument;
  const extra=dd.createElement("style");
  extra.textContent="h2{page-break-after:avoid}tr,.tot{page-break-inside:avoid}";
  dd.head.appendChild(extra);
  try{
    await html2pdf().set({
      margin:[10,8,12,8],
      filename:filename,
      image:{type:"jpeg",quality:0.95},
      html2canvas:{scale:2,useCORS:true,scrollX:0,scrollY:0},
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
      pagebreak:{mode:["css","legacy"]}
    }).from(dd.body).save();
  }catch(e){
    alert("PDF не собрался ("+e.message+") — скачиваю HTML");
    const blob=new Blob([doc],{type:"text/html;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename.replace(/\.pdf$/i,".html");
    document.body.appendChild(a); a.click(); a.remove();
  }
  ifr.remove();
}

dp.value=new Date().toISOString().slice(0,10);
